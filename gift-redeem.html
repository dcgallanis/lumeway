<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redeem a Gift — Lumeway</title>
<link rel="icon" href="/static/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --navy: #2C4A5E; --cream: #FAF7F2; --warm-white: #FDFCFA; --accent: #C4704E; --accent-light: #D4896C; --gold: #B8977E; --green: #4A7C59; --muted: #6B7B8D; --text: #2C3E50; --border: #E8E0D6; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--cream); font-family: 'Plus Jakarta Sans', system-ui, sans-serif; color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; -webkit-font-smoothing: antialiased; }

  .top-bar { width: 100%; background: linear-gradient(135deg, var(--navy), #1B3A4E); padding: 20px 5%; display: flex; align-items: center; justify-content: center; }
  .top-bar a { font-size: 12px; font-weight: 600; color: rgba(250,247,242,0.45); letter-spacing: 3px; text-transform: uppercase; text-decoration: none; }
  .gold-line { width: 100%; height: 3px; background: linear-gradient(90deg, var(--gold), #D4B49A, var(--gold)); }

  .redeem-card { max-width: 480px; width: 100%; margin: 60px 20px; background: var(--warm-white); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; box-shadow: 0 4px 24px rgba(44,74,94,0.06); }
  .redeem-header { padding: 36px 36px 0; text-align: center; }
  .redeem-icon { font-size: 40px; margin-bottom: 12px; }
  .redeem-title { font-family: 'Libre Baskerville', Georgia, serif; font-size: 24px; font-weight: 400; color: var(--navy); margin-bottom: 8px; }
  .redeem-subtitle { font-size: 14px; color: var(--muted); font-weight: 300; line-height: 1.6; }

  .redeem-form { padding: 28px 36px 36px; }
  .redeem-label { display: block; font-size: 12px; font-weight: 500; color: var(--navy); margin-bottom: 6px; letter-spacing: 0.3px; }
  .redeem-input { width: 100%; padding: 14px 18px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 15px; font-weight: 400; color: var(--navy); background: var(--cream); border: 2px solid var(--border); border-radius: 12px; outline: none; transition: border-color 0.2s; }
  .redeem-input:focus { border-color: var(--gold); }
  .redeem-input::placeholder { color: #ccc; font-weight: 400; }
  .redeem-input-code { font-size: 18px; font-weight: 600; letter-spacing: 2px; text-align: center; text-transform: uppercase; }
  .redeem-input-code::placeholder { font-weight: 400; letter-spacing: 1px; font-size: 14px; text-transform: none; }
  .field-gap { margin-top: 14px; }
  .redeem-btn { width: 100%; margin-top: 18px; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 12px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .redeem-btn:hover { background: var(--accent-light); transform: translateY(-1px); }
  .redeem-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .redeem-msg { margin-top: 16px; padding: 14px 18px; border-radius: 10px; font-size: 13px; line-height: 1.6; display: none; }
  .redeem-msg.success { display: block; background: #e8f5e9; color: var(--green); border: 1px solid #c8e6c9; }
  .redeem-msg.error { display: block; background: #fef3f0; color: var(--accent); border: 1px solid #f5d5c8; }

  .step-indicator { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 20px; }
  .step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: background 0.3s; }
  .step-dot.active { background: var(--accent); }
  .step-dot.done { background: var(--green); }
  .step-line { width: 24px; height: 2px; background: var(--border); }

  .verify-email-hint { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 16px; text-align: center; }
  .verify-email-hint strong { color: var(--navy); font-weight: 600; }
  .verify-input { font-size: 24px; font-weight: 600; letter-spacing: 8px; text-align: center; }
  .back-link { display: inline-block; margin-top: 12px; font-size: 13px; color: var(--muted); cursor: pointer; text-decoration: underline; background: none; border: none; font-family: inherit; }
  .back-link:hover { color: var(--navy); }

  .success-icon { font-size: 48px; margin-bottom: 16px; text-align: center; }
  .success-msg { font-size: 15px; color: var(--navy); line-height: 1.6; text-align: center; margin-bottom: 20px; font-weight: 400; }

  .redeem-footer { padding: 20px 36px; background: #F5F0E8; border-top: 1px solid var(--border); text-align: center; }
  .redeem-footer p { font-size: 11px; color: #999; }
  .redeem-footer a { color: var(--navy); text-decoration: none; font-weight: 500; }

  .step-panel { display: none; }
  .step-panel.active { display: block; }
</style>
</head>
<body>
  <div class="top-bar"><a href="/">&#9788;&ensp;LUMEWAY</a></div>
  <div class="gold-line"></div>

  <div class="redeem-card">
    <div class="redeem-header">
      <div class="redeem-icon">🎁</div>
      <h1 class="redeem-title">Redeem a gift</h1>
      <p class="redeem-subtitle" id="headerSubtitle">Enter your email and gift code to get started.</p>
      <div style="padding-top: 20px;">
        <div class="step-indicator">
          <div class="step-dot active" id="dot1"></div>
          <div class="step-line"></div>
          <div class="step-dot" id="dot2"></div>
          <div class="step-line"></div>
          <div class="step-dot" id="dot3"></div>
        </div>
      </div>
    </div>

    <!-- Step 1: Email + Gift Code -->
    <div class="redeem-form step-panel active" id="step1">
      <label class="redeem-label" for="emailInput">Email address</label>
      <input type="email" id="emailInput" class="redeem-input" placeholder="you@example.com" autocomplete="email">
      <div class="field-gap">
        <label class="redeem-label" for="giftCode">Gift code</label>
        <input type="text" id="giftCode" class="redeem-input redeem-input-code" placeholder="LUME-XXXX-XXXX" maxlength="14" autocomplete="off">
      </div>
      <button class="redeem-btn" id="redeemBtn" onclick="submitStep1()">Redeem Gift</button>
      <div class="redeem-msg" id="step1Msg"></div>
    </div>

    <!-- Step 2: Verification Code -->
    <div class="redeem-form step-panel" id="step2">
      <p class="verify-email-hint">We sent a 6-digit code to <strong id="verifyEmailDisplay"></strong></p>
      <label class="redeem-label" for="authCode">Verification code</label>
      <input type="text" id="authCode" class="redeem-input verify-input" placeholder="000000" maxlength="6" autocomplete="one-time-code" inputmode="numeric">
      <button class="redeem-btn" id="verifyBtn" onclick="submitStep2()">Verify</button>
      <div class="redeem-msg" id="step2Msg"></div>
      <div style="text-align:center">
        <button class="back-link" onclick="goToStep(1)">Back to previous step</button>
      </div>
    </div>

    <!-- Step 3: Success -->
    <div class="redeem-form step-panel" id="step3">
      <div class="success-icon">&#10003;</div>
      <div class="success-msg" id="successMsg"></div>
      <button class="redeem-btn" onclick="window.location.href='/dashboard'">Go to Dashboard</button>
    </div>

    <div class="redeem-footer">
      <p><a href="/">lumeway.co</a> &middot; Step-by-step guidance through life's hardest transitions</p>
    </div>
  </div>

<script>
var storedEmail = '';
var storedCode = '';

function goToStep(num) {
  document.querySelectorAll('.step-panel').forEach(function(el) { el.classList.remove('active'); });
  document.getElementById('step' + num).classList.add('active');

  // Update dots
  for (var i = 1; i <= 3; i++) {
    var dot = document.getElementById('dot' + i);
    dot.className = 'step-dot';
    if (i < num) dot.classList.add('done');
    if (i === num) dot.classList.add('active');
  }

  // Update subtitle
  var sub = document.getElementById('headerSubtitle');
  if (num === 1) sub.textContent = 'Enter your email and gift code to get started.';
  else if (num === 2) sub.textContent = 'Check your email for a verification code.';
  else if (num === 3) sub.textContent = '';
}

function showMsg(elId, type, text) {
  var msg = document.getElementById(elId);
  msg.className = 'redeem-msg ' + type;
  msg.textContent = text;
  msg.style.display = 'block';
}

function hideMsg(elId) {
  var msg = document.getElementById(elId);
  msg.style.display = 'none';
  msg.className = 'redeem-msg';
}

function submitStep1() {
  var email = document.getElementById('emailInput').value.trim();
  var code = document.getElementById('giftCode').value.trim().toUpperCase();
  var btn = document.getElementById('redeemBtn');
  hideMsg('step1Msg');

  if (!email) { showMsg('step1Msg', 'error', 'Please enter your email address.'); return; }
  if (!code) { showMsg('step1Msg', 'error', 'Please enter your gift code.'); return; }

  btn.disabled = true;
  btn.textContent = 'Sending code...';

  fetch('/api/gift/redeem-start', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include',
    body: JSON.stringify({ email: email, code: code })
  })
  .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
  .then(function(res) {
    btn.disabled = false;
    btn.textContent = 'Redeem Gift';
    if (res.ok && res.data.ok) {
      storedEmail = email;
      storedCode = code;
      document.getElementById('verifyEmailDisplay').textContent = email;
      goToStep(2);
      if (res.data.demo && res.data.demo_code) {
        document.getElementById('authCode').value = res.data.demo_code;
        showMsg('step2Msg', 'success', 'Demo account — code pre-filled. Just hit Verify.');
      }
      document.getElementById('authCode').focus();
    } else {
      showMsg('step1Msg', 'error', res.data.error || 'Something went wrong.');
    }
  })
  .catch(function() {
    btn.disabled = false;
    btn.textContent = 'Redeem Gift';
    showMsg('step1Msg', 'error', 'Something went wrong. Please try again.');
  });
}

function submitStep2() {
  var authCode = document.getElementById('authCode').value.trim();
  var btn = document.getElementById('verifyBtn');
  hideMsg('step2Msg');

  if (!authCode || authCode.length < 6) { showMsg('step2Msg', 'error', 'Please enter the 6-digit code from your email.'); return; }

  btn.disabled = true;
  btn.textContent = 'Verifying...';

  fetch('/api/gift/redeem-verify', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include',
    body: JSON.stringify({ email: storedEmail, code: storedCode, auth_code: authCode })
  })
  .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
  .then(function(res) {
    btn.disabled = false;
    btn.textContent = 'Verify';
    if (res.ok && res.data.ok) {
      document.getElementById('successMsg').textContent = res.data.message || 'Gift redeemed! Head to your dashboard.';
      goToStep(3);
    } else {
      showMsg('step2Msg', 'error', res.data.error || 'Something went wrong.');
    }
  })
  .catch(function() {
    btn.disabled = false;
    btn.textContent = 'Verify';
    showMsg('step2Msg', 'error', 'Something went wrong. Please try again.');
  });
}

// Auto-format gift code input as LUME-XXXX-XXXX
document.getElementById('giftCode').addEventListener('input', function(e) {
  var v = e.target.value.replace(/[^A-Za-z0-9]/g, '').toUpperCase();
  if (v.length > 12) v = v.substring(0, 12);
  var parts = [];
  if (v.length > 0) parts.push(v.substring(0, 4));
  if (v.length > 4) parts.push(v.substring(4, 8));
  if (v.length > 8) parts.push(v.substring(8, 12));
  e.target.value = parts.join('-');
});

// Allow Enter key on each input
document.getElementById('emailInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { document.getElementById('giftCode').focus(); }
});
document.getElementById('giftCode').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') submitStep1();
});
document.getElementById('authCode').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') submitStep2();
});

// Auto-format verification code (digits only)
document.getElementById('authCode').addEventListener('input', function(e) {
  e.target.value = e.target.value.replace(/[^0-9]/g, '').substring(0, 6);
});
</script>
</body>
</html>
