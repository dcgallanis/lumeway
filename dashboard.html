<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Dashboard — Lumeway</title>
  <meta name="description" content="Track your transition progress, view past conversations, and manage your checklist."/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --cream: #F7F4EF; --warm-white: #FDFCFA; --text: #1B2A38; --muted: #6E7D8A; --navy: #1B3A5C; --gold: #B8977E; --accent: #1B3A5C; --accent-light: #B8977E; --border: #E4DDD3; --green: #7DB896; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); -webkit-font-smoothing: antialiased; }

    /* Nav */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 20px 48px; display: flex; align-items: center; justify-content: space-between; background: rgba(247,244,239,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo-icon { width: 32px; height: 32px; background: var(--navy); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--cream); font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 500; }
    .nav-logo-text { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 500; color: var(--text); }
    .nav-right { display: flex; gap: 12px; align-items: center; }
    .btn-ghost { padding: 8px 20px; border: 1px solid var(--border); border-radius: 100px; background: transparent; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; text-decoration: none; transition: all 0.2s; cursor: pointer; }
    .btn-ghost:hover { background: var(--navy); color: var(--cream); }
    .btn-primary { padding: 8px 20px; border: none; border-radius: 100px; background: var(--navy); color: var(--cream); font-family: 'DM Sans', sans-serif; font-size: 14px; text-decoration: none; transition: all 0.2s; }

    /* Dashboard layout */
    .dash { max-width: 900px; margin: 0 auto; padding: 100px 24px 64px; }
    .dash-header { margin-bottom: 32px; }
    .dash-greeting { font-family: 'Cormorant Garamond', serif; font-size: clamp(32px, 5vw, 44px); font-weight: 300; line-height: 1.15; margin-bottom: 8px; }
    .dash-sub { font-size: 15px; font-weight: 300; color: var(--muted); }

    /* Tabs */
    .dash-tabs { display: flex; gap: 4px; margin-bottom: 28px; border-bottom: 1px solid var(--border); }
    .dash-tab { padding: 12px 24px; background: none; border: none; border-bottom: 2px solid transparent; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 400; color: var(--muted); cursor: pointer; transition: all 0.15s; }
    .dash-tab:hover { color: var(--text); }
    .dash-tab.active { color: var(--navy); border-bottom-color: var(--navy); font-weight: 500; }
    .dash-tab .tab-badge { display: inline-flex; align-items: center; justify-content: center; background: var(--gold); color: white; font-size: 10px; font-weight: 600; min-width: 18px; height: 18px; border-radius: 9px; margin-left: 6px; padding: 0 5px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Cards */
    .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 32px; }
    .dash-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 16px; padding: 28px; }
    .dash-card-full { grid-column: 1 / -1; }
    .card-label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
    .card-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 400; margin-bottom: 8px; }
    .card-empty { font-size: 14px; font-weight: 300; color: var(--muted); line-height: 1.6; }

    /* Progress ring */
    .progress-row { display: flex; align-items: center; gap: 20px; }
    .progress-ring { width: 72px; height: 72px; position: relative; flex-shrink: 0; }
    .progress-ring svg { transform: rotate(-90deg); }
    .progress-ring circle { fill: none; stroke-width: 6; }
    .progress-ring .bg { stroke: var(--border); }
    .progress-ring .fill { stroke: var(--green); stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
    .progress-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 500; color: var(--navy); }
    .progress-info { font-size: 14px; font-weight: 300; color: var(--muted); line-height: 1.6; }
    .progress-info strong { color: var(--text); font-weight: 500; }

    /* Checklist */
    .checklist-phases { display: flex; flex-direction: column; gap: 20px; }
    .phase-title { font-size: 13px; font-weight: 500; color: var(--navy); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    .check-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
    .check-item:last-child { border-bottom: none; }
    .check-box { width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 6px; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .check-item.done .check-box { background: var(--green); border-color: var(--green); }
    .check-item.done .check-box::after { content: '\2713'; color: white; font-size: 12px; font-weight: 600; }
    .check-item.done .check-text { text-decoration: line-through; color: var(--muted); }
    .check-text { font-size: 14px; font-weight: 300; line-height: 1.5; }

    /* Checklist init */
    .init-checklist { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
    .init-label { font-size: 13px; font-weight: 400; color: var(--text); margin-bottom: 10px; }
    .init-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .init-select { font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--cream); color: var(--text); }
    .init-btn { padding: 10px 20px; border: none; border-radius: 100px; background: var(--navy); color: var(--cream); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
    .init-btn:hover { background: var(--accent-light); }

    /* Chat history */
    .session-list { display: flex; flex-direction: column; gap: 8px; }
    .session-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border: 1px solid var(--border); border-radius: 12px; cursor: pointer; transition: all 0.15s; text-decoration: none; color: var(--text); }
    .session-item:hover { border-color: var(--gold); background: var(--cream); }
    .session-preview { font-size: 14px; font-weight: 300; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .session-date { font-size: 12px; color: var(--muted); flex-shrink: 0; margin-left: 12px; }
    .session-cat { display: inline-block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--gold); font-weight: 500; margin-right: 8px; }

    /* Purchases */
    .purchase-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--border); }
    .purchase-item:last-child { border-bottom: none; }
    .purchase-name { font-size: 14px; font-weight: 400; }
    .purchase-date { font-size: 12px; color: var(--muted); }
    .purchase-dl { font-size: 13px; color: var(--navy); text-decoration: underline; }

    /* Conversation detail modal */
    .conv-modal { display: none; position: fixed; inset: 0; background: rgba(27,42,56,0.5); z-index: 200; padding: 24px; overflow-y: auto; }
    .conv-modal.open { display: flex; align-items: flex-start; justify-content: center; padding-top: 80px; }
    .conv-box { background: var(--cream); border-radius: 20px; max-width: 640px; width: 100%; max-height: 80vh; overflow-y: auto; padding: 32px; }
    .conv-close { float: right; background: none; border: none; font-size: 24px; cursor: pointer; color: var(--muted); padding: 0 8px; }
    .conv-close:hover { color: var(--text); }
    .conv-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 400; margin-bottom: 24px; }
    .conv-msg { padding: 12px 16px; border-radius: 14px; margin-bottom: 8px; font-size: 14px; font-weight: 300; line-height: 1.6; max-width: 85%; }
    .conv-msg.user { background: var(--navy); color: var(--cream); margin-left: auto; border-bottom-right-radius: 4px; }
    .conv-msg.assistant { background: var(--warm-white); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

    /* Quick actions on overview */
    .quick-actions { display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; }
    .quick-btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; border: 1px solid var(--border); border-radius: 100px; background: var(--warm-white); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 400; text-decoration: none; transition: all 0.15s; cursor: pointer; }
    .quick-btn:hover { border-color: var(--gold); background: var(--cream); transform: translateY(-1px); }

    /* Loading */
    .loading { text-align: center; padding: 48px; color: var(--muted); font-size: 15px; font-weight: 300; }

    /* Responsive */
    @media (max-width: 768px) {
      nav { padding: 14px 20px; }
      .nav-right { gap: 8px; }
      .dash { padding: 85px 16px 48px; }
      .dash-grid { grid-template-columns: 1fr; }
      .dash-tabs { overflow-x: auto; }
      .dash-tab { padding: 12px 16px; white-space: nowrap; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon">L</div>
      <span class="nav-logo-text">Lumeway</span>
    </a>
    <div class="nav-right">
      <a href="/chat" target="_blank" class="btn-primary">Open Navigator</a>
      <button class="btn-ghost" onclick="logout()">Log out</button>
    </div>
  </nav>

  <div class="dash" id="dashContent">
    <div class="loading" id="loadingState">Loading your dashboard...</div>
  </div>

  <div class="conv-modal" id="convModal" onclick="if(event.target===this)closeConv()">
    <div class="conv-box">
      <button class="conv-close" onclick="closeConv()">&times;</button>
      <h2 class="conv-title">Conversation</h2>
      <div id="convMessages"></div>
    </div>
  </div>

  <script>
    var dashData = null;
    var checklistItems = [];
    var currentTab = 'overview';

    function formatDate(iso) {
      if (!iso) return '';
      var d = new Date(iso);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function logout() {
      fetch('/api/auth/logout', { method: 'POST' }).then(function() {
        window.location.href = '/';
      });
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.dash-tab').forEach(function(t) {
        t.classList.toggle('active', t.dataset.tab === tab);
      });
      document.querySelectorAll('.tab-panel').forEach(function(p) {
        p.classList.toggle('active', p.id === 'panel-' + tab);
      });
    }

    function loadDashboard() {
      Promise.all([
        fetch('/api/dashboard/data').then(function(r) { return r.json(); }),
        fetch('/api/checklist').then(function(r) { return r.json(); })
      ]).then(function(results) {
        dashData = results[0];
        checklistItems = results[1].items || [];
        renderDashboard();
      }).catch(function(err) {
        document.getElementById('loadingState').textContent = 'Failed to load dashboard. Please refresh.';
      });
    }

    function getProgress() {
      var total = checklistItems.length;
      var completed = checklistItems.filter(function(i) { return i.is_completed; }).length;
      var pct = total > 0 ? Math.round((completed / total) * 100) : 0;
      return { total: total, completed: completed, pct: pct };
    }

    function renderDashboard() {
      var u = dashData.user;
      var sessions = dashData.sessions || [];
      var purchases = dashData.purchases || [];
      var prog = getProgress();
      var circumference = 2 * Math.PI * 30;
      var offset = circumference - (prog.pct / 100) * circumference;
      var name = u.display_name || u.email.split('@')[0];

      var html = '';
      html += '<div class="dash-header">';
      html += '  <h1 class="dash-greeting">Welcome back, ' + name + '</h1>';
      html += '  <p class="dash-sub">' + u.email + '</p>';
      html += '</div>';

      // Tabs
      html += '<div class="dash-tabs">';
      html += '  <button class="dash-tab active" data-tab="overview" onclick="switchTab(\'overview\')">Overview</button>';
      html += '  <button class="dash-tab" data-tab="checklist" onclick="switchTab(\'checklist\')">Checklist';
      if (prog.total > 0) html += ' <span class="tab-badge">' + prog.completed + '/' + prog.total + '</span>';
      html += '</button>';
      html += '  <button class="dash-tab" data-tab="history" onclick="switchTab(\'history\')">History';
      if (sessions.length > 0) html += ' <span class="tab-badge">' + sessions.length + '</span>';
      html += '</button>';
      if (purchases.length > 0) {
        html += '  <button class="dash-tab" data-tab="purchases" onclick="switchTab(\'purchases\')">Purchases</button>';
      }
      html += '</div>';

      // ── Overview tab ──
      html += '<div class="tab-panel active" id="panel-overview">';
      html += '<div class="quick-actions">';
      html += '  <a href="/chat" target="_blank" class="quick-btn">\uD83D\uDCAC Continue chatting</a>';
      if (prog.total > 0) html += '  <button class="quick-btn" onclick="switchTab(\'checklist\')">\u2713 My checklist</button>';
      if (sessions.length > 0) html += '  <button class="quick-btn" onclick="switchTab(\'history\')">\uD83D\uDCCB Chat history</button>';
      html += '</div>';

      html += '<div class="dash-grid">';
      // Progress card
      html += '<div class="dash-card">';
      html += '  <div class="card-label">Progress</div>';
      if (prog.total > 0) {
        html += '  <div class="progress-row">';
        html += '    <div class="progress-ring" id="progressRing">';
        html += '      <svg width="72" height="72"><circle class="bg" cx="36" cy="36" r="30"/><circle class="fill" id="progressFill" cx="36" cy="36" r="30" stroke-dasharray="' + circumference + '" stroke-dashoffset="' + offset + '"/></svg>';
        html += '      <div class="progress-pct" id="progressPct">' + prog.pct + '%</div>';
        html += '    </div>';
        html += '    <div class="progress-info" id="progressInfo"><strong>' + prog.completed + ' of ' + prog.total + '</strong> tasks completed</div>';
        html += '  </div>';
      } else {
        html += '  <p class="card-empty">Start a checklist to track your progress.</p>';
        html += '  <button class="quick-btn" style="margin-top:12px" onclick="switchTab(\'checklist\')">Create checklist</button>';
      }
      html += '</div>';

      // Sessions card
      html += '<div class="dash-card">';
      html += '  <div class="card-label">Conversations</div>';
      if (sessions.length > 0) {
        html += '  <div class="card-title">' + sessions.length + ' session' + (sessions.length !== 1 ? 's' : '') + '</div>';
        html += '  <p class="card-empty" style="margin-top:4px"><a href="#" onclick="switchTab(\'history\');return false" style="color:var(--navy)">View chat history</a></p>';
      } else {
        html += '  <p class="card-empty">No conversations yet. <a href="/chat" target="_blank" style="color:var(--navy)">Start one</a>.</p>';
      }
      html += '</div>';
      html += '</div>'; // dash-grid
      html += '</div>'; // panel-overview

      // ── Checklist tab ──
      html += '<div class="tab-panel" id="panel-checklist">';
      if (checklistItems.length > 0) {
        // Progress at top of checklist
        html += '<div class="dash-card" style="margin-bottom:20px">';
        html += '  <div class="progress-row">';
        html += '    <div class="progress-ring" id="clProgressRing">';
        html += '      <svg width="72" height="72"><circle class="bg" cx="36" cy="36" r="30"/><circle class="fill" id="clProgressFill" cx="36" cy="36" r="30" stroke-dasharray="' + circumference + '" stroke-dashoffset="' + offset + '"/></svg>';
        html += '      <div class="progress-pct" id="clProgressPct">' + prog.pct + '%</div>';
        html += '    </div>';
        html += '    <div class="progress-info" id="clProgressInfo"><strong>' + prog.completed + ' of ' + prog.total + '</strong> tasks completed</div>';
        html += '  </div>';
        html += '</div>';

        // Checklist items
        html += '<div class="dash-card" style="margin-bottom:20px">';
        var phases = {};
        var phaseOrder = [];
        checklistItems.forEach(function(item) {
          if (!phases[item.phase]) { phases[item.phase] = []; phaseOrder.push(item.phase); }
          phases[item.phase].push(item);
        });
        html += '<div class="checklist-phases">';
        phaseOrder.forEach(function(phase) {
          html += '<div><div class="phase-title">' + phase + '</div>';
          phases[phase].forEach(function(item) {
            var doneClass = item.is_completed ? ' done' : '';
            html += '<div class="check-item' + doneClass + '" data-id="' + item.id + '" onclick="toggleItem(' + item.id + ', this)">';
            html += '  <div class="check-box"></div>';
            html += '  <div class="check-text">' + item.item_text + '</div>';
            html += '</div>';
          });
          html += '</div>';
        });
        html += '</div>';

        // Add another transition
        html += '<div class="init-checklist">';
        html += '  <div class="init-label">Add another transition checklist:</div>';
        html += '  <div class="init-row">';
        html += '    <select class="init-select" id="transitionSelect">';
        html += '      <option value="">Choose a transition...</option>';
        html += '      <option value="estate">Death & Estate</option>';
        html += '      <option value="divorce">Divorce & Separation</option>';
        html += '      <option value="job-loss">Job Loss & Income Crisis</option>';
        html += '      <option value="relocation">Moving & Relocation</option>';
        html += '      <option value="disability">Disability & Benefits</option>';
        html += '      <option value="retirement">Retirement</option>';
        html += '    </select>';
        html += '    <button class="init-btn" onclick="initChecklist()">Add</button>';
        html += '  </div>';
        html += '</div>';
        html += '</div>';
      } else {
        html += '<div class="dash-card">';
        html += '  <div class="card-label">My Checklist</div>';
        html += '  <p class="card-empty">Create a checklist to stay organized through your transition.</p>';
        html += '  <div class="init-checklist" style="border-top:none;padding-top:0">';
        html += '    <div class="init-row">';
        html += '      <select class="init-select" id="transitionSelect">';
        html += '        <option value="">Choose your transition...</option>';
        html += '        <option value="estate">Death & Estate</option>';
        html += '        <option value="divorce">Divorce & Separation</option>';
        html += '        <option value="job-loss">Job Loss & Income Crisis</option>';
        html += '        <option value="relocation">Moving & Relocation</option>';
        html += '        <option value="disability">Disability & Benefits</option>';
        html += '        <option value="retirement">Retirement</option>';
        html += '      </select>';
        html += '      <button class="init-btn" onclick="initChecklist()">Create checklist</button>';
        html += '    </div>';
        html += '  </div>';
        html += '</div>';
      }
      html += '</div>'; // panel-checklist

      // ── History tab ──
      html += '<div class="tab-panel" id="panel-history">';
      if (sessions.length > 0) {
        html += '<div class="dash-card">';
        html += '  <div class="session-list">';
        sessions.forEach(function(s) {
          var cat = s.transition_category ? '<span class="session-cat">' + s.transition_category + '</span>' : '';
          html += '<div class="session-item" onclick="openConv(\'' + s.id + '\')">';
          html += '  <div class="session-preview">' + cat + (s.preview || 'Conversation') + '</div>';
          html += '  <div class="session-date">' + formatDate(s.started_at) + '</div>';
          html += '</div>';
        });
        html += '  </div>';
        html += '</div>';
      } else {
        html += '<div class="dash-card">';
        html += '  <p class="card-empty">No conversations yet. <a href="/chat" target="_blank" style="color:var(--navy)">Start one</a> to see your history here.</p>';
        html += '</div>';
      }
      html += '</div>'; // panel-history

      // ── Purchases tab ──
      if (purchases.length > 0) {
        html += '<div class="tab-panel" id="panel-purchases">';
        html += '<div class="dash-card">';
        purchases.forEach(function(p) {
          html += '<div class="purchase-item">';
          html += '  <div><div class="purchase-name">' + p.product_name + '</div><div class="purchase-date">' + formatDate(p.purchased_at) + '</div></div>';
          html += '  <a href="/download/' + p.download_token + '" class="purchase-dl">Download</a>';
          html += '</div>';
        });
        html += '</div>';
        html += '</div>'; // panel-purchases
      }

      document.getElementById('dashContent').innerHTML = html;

      // Restore active tab if we re-rendered
      if (currentTab !== 'overview') switchTab(currentTab);
    }

    function updateProgressUI() {
      var prog = getProgress();
      var circumference = 2 * Math.PI * 30;
      var offset = circumference - (prog.pct / 100) * circumference;

      // Update all progress ring instances
      ['', 'cl'].forEach(function(prefix) {
        var fill = document.getElementById(prefix + 'ProgressFill');
        var pct = document.getElementById(prefix + 'ProgressPct');
        var info = document.getElementById(prefix + 'ProgressInfo');
        if (fill) fill.setAttribute('stroke-dashoffset', offset);
        if (pct) pct.textContent = prog.pct + '%';
        if (info) info.innerHTML = '<strong>' + prog.completed + ' of ' + prog.total + '</strong> tasks completed';
      });

      // Update tab badge
      var clTab = document.querySelector('[data-tab="checklist"]');
      if (clTab) {
        var badge = clTab.querySelector('.tab-badge');
        if (badge) badge.textContent = prog.completed + '/' + prog.total;
      }
    }

    function toggleItem(itemId, el) {
      fetch('/api/checklist/' + itemId + '/toggle', { method: 'POST' })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.ok) {
          el.classList.toggle('done');
          checklistItems.forEach(function(item) {
            if (item.id === itemId) item.is_completed = data.is_completed;
          });
          updateProgressUI();
        }
      });
    }

    function initChecklist() {
      var sel = document.getElementById('transitionSelect');
      var type = sel.value;
      if (!type) return;
      fetch('/api/checklist/init', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ transition_type: type })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.ok) {
          currentTab = 'checklist';
          loadDashboard();
        }
      });
    }

    function openConv(sessionId) {
      document.getElementById('convMessages').innerHTML = '<div class="loading">Loading conversation...</div>';
      document.getElementById('convModal').classList.add('open');
      fetch('/api/dashboard/history/' + sessionId)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var html = '';
        (data.messages || []).forEach(function(m) {
          html += '<div class="conv-msg ' + m.role + '">' + m.content.replace(/</g, '&lt;').replace(/\n/g, '<br>') + '</div>';
        });
        if (!html) html = '<p class="card-empty">No messages found for this session.</p>';
        document.getElementById('convMessages').innerHTML = html;
      });
    }

    function closeConv() {
      document.getElementById('convModal').classList.remove('open');
    }

    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeConv(); });

    loadDashboard();
  </script>
</body>
</html>
