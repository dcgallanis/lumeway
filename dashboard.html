<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Dashboard — Lumeway</title>
  <meta name="description" content="Track your transition progress, view past conversations, and manage your checklist."/>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --cream: #FAF7F2; --warm-white: #FDFCFA; --text: #2C3E50; --muted: #6B7B8D; --navy: #2C4A5E; --gold: #B8977E; --accent: #C4704E; --accent-light: #D4896C; --border: #E8E0D6; --green: #6B8F5E; --red: #C4704E; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--cream); color: var(--text); -webkit-font-smoothing: antialiased; }

    /* Nav */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 20px 48px; display: flex; align-items: center; justify-content: space-between; background: rgba(247,244,239,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo-icon { width: 32px; height: 32px; background: var(--navy); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--cream); font-family: 'Libre Baskerville', serif; font-size: 18px; font-weight: 500; }
    .nav-logo-text { font-family: 'Libre Baskerville', serif; font-size: 20px; font-weight: 500; color: var(--text); }
    .nav-right { display: flex; gap: 12px; align-items: center; }
    .btn-ghost { padding: 8px 20px; border: 1px solid var(--border); border-radius: 8px; background: transparent; color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; text-decoration: none; transition: all 0.2s; cursor: pointer; }
    .btn-ghost:hover { background: var(--accent); color: var(--cream); border-color: var(--accent); }
    .btn-primary { padding: 8px 20px; border: none; border-radius: 8px; background: var(--accent); color: var(--cream); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; text-decoration: none; transition: all 0.2s; cursor: pointer; }
    .btn-primary:hover { background: var(--accent-light); }

    /* Dashboard layout */
    .dash { max-width: 1100px; margin: 0 auto; padding: 100px 24px 64px; }
    .dash-header { margin-bottom: 32px; }
    .dash-greeting { font-family: 'Libre Baskerville', serif; font-size: clamp(32px, 5vw, 44px); font-weight: 300; line-height: 1.15; margin-bottom: 8px; }
    .dash-sub { font-size: 15px; font-weight: 300; color: var(--muted); }

    /* Tabs */
    .dash-tabs { display: flex; gap: 4px; margin-bottom: 28px; border-bottom: 1px solid var(--border); }
    .dash-tab { padding: 12px 24px; background: none; border: none; border-bottom: 2px solid transparent; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 400; color: var(--muted); cursor: pointer; transition: all 0.15s; }
    .dash-tab:hover { color: var(--text); }
    .dash-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
    .dash-tab .tab-badge { display: inline-flex; align-items: center; justify-content: center; background: var(--accent); color: white; font-size: 10px; font-weight: 600; min-width: 18px; height: 18px; border-radius: 9px; margin-left: 6px; padding: 0 5px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Cards */
    .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    .dash-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    .dash-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 16px; padding: 28px; }
    .dash-card-full { grid-column: 1 / -1; }
    .card-label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
    .card-title { font-family: 'Libre Baskerville', serif; font-size: 24px; font-weight: 400; margin-bottom: 8px; }
    .card-empty { font-size: 14px; font-weight: 300; color: var(--muted); line-height: 1.6; }

    /* Overview layout: sidebar with progress */
    .overview-layout { display: grid; grid-template-columns: 1fr 200px; gap: 20px; margin-bottom: 24px; }
    .overview-main { display: flex; flex-direction: column; gap: 20px; }
    .overview-sidebar { display: flex; flex-direction: column; gap: 16px; }
    .progress-compact { background: var(--warm-white); border: 1px solid var(--border); border-radius: 16px; padding: 20px; text-align: center; }

    /* Progress ring */
    .progress-row { display: flex; align-items: center; gap: 20px; }
    .progress-ring { width: 72px; height: 72px; position: relative; flex-shrink: 0; margin: 0 auto; }
    .progress-ring svg { transform: rotate(-90deg); }
    .progress-ring circle { fill: none; stroke-width: 6; }
    .progress-ring .bg { stroke: var(--border); }
    .progress-ring .fill { stroke: var(--green); stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
    .progress-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 500; color: var(--navy); }
    .progress-info { font-size: 12px; font-weight: 300; color: var(--muted); line-height: 1.5; margin-top: 8px; }
    .progress-info strong { color: var(--text); font-weight: 500; }

    /* Checklist */
    .checklist-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .checklist-category { background: var(--warm-white); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
    .category-header { font-family: 'Libre Baskerville', serif; font-size: 20px; font-weight: 400; color: var(--navy); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .phase-title { font-size: 12px; font-weight: 500; color: var(--gold); margin: 14px 0 6px; text-transform: uppercase; letter-spacing: 0.06em; }
    .check-item { display: flex; align-items: flex-start; gap: 10px; padding: 7px 0; cursor: pointer; }
    .check-box { width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 6px; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .check-item.done .check-box { background: var(--green); border-color: var(--green); }
    .check-item.done .check-box::after { content: '\2713'; color: white; font-size: 12px; font-weight: 600; }
    .check-item.done .check-text { text-decoration: line-through; color: var(--muted); }
    .check-text { font-size: 13px; font-weight: 300; line-height: 1.5; }

    /* Single column checklist when only one category */
    .checklist-single { max-width: 640px; }

    /* Checklist init */
    .init-checklist { margin-top: 20px; padding: 20px 24px; background: var(--warm-white); border: 1px solid var(--border); border-radius: 16px; }
    .init-label { font-size: 13px; font-weight: 400; color: var(--text); margin-bottom: 10px; }
    .init-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .init-select { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--cream); color: var(--text); }
    .init-btn { padding: 10px 20px; border: none; border-radius: 8px; background: var(--accent); color: var(--cream); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
    .init-btn:hover { background: var(--accent-light); }

    /* Goals */
    .goal-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .goal-item:last-child { border-bottom: none; }
    .goal-item.done .check-box { background: var(--green); border-color: var(--green); }
    .goal-item.done .goal-text { text-decoration: line-through; color: var(--muted); }
    .goal-text { font-size: 14px; font-weight: 300; line-height: 1.5; flex: 1; cursor: pointer; }
    .goal-date { font-size: 11px; color: var(--muted); white-space: nowrap; margin-top: 2px; }
    .goal-add { display: flex; gap: 8px; margin-top: 12px; }
    .goal-input { flex: 1; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; padding: 8px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--cream); color: var(--text); outline: none; }
    .goal-input:focus { border-color: var(--accent); }

    /* Calendar — Apple Calendar style */
    .cal-card { padding: 16px; }
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .cal-month { font-family: 'Libre Baskerville', serif; font-size: 24px; font-weight: 400; }
    .cal-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 14px; color: var(--text); transition: all 0.15s; }
    .cal-btn:hover { background: var(--cream); border-color: var(--gold); }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-left: 1px solid var(--border); border-top: 1px solid var(--border); width: 100%; }
    .cal-header { text-align: center; font-size: 11px; font-weight: 500; color: var(--muted); padding: 10px 0; text-transform: uppercase; letter-spacing: 0.05em; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); background: var(--cream); }
    .cal-day { height: 110px; background: var(--warm-white); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 4px 6px; font-size: 12px; position: relative; cursor: pointer; overflow: hidden; }
    .cal-day:hover { background: rgba(184,151,126,0.06); }
    .cal-day.today { background: rgba(27,58,92,0.04); }
    .cal-day.today .cal-day-num { background: var(--navy); color: var(--cream); border-radius: 50%; width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; }
    .cal-day.other-month { background: var(--cream); }
    .cal-day.other-month .cal-day-num { color: var(--border); }
    .cal-day-num { font-weight: 500; color: var(--text); margin-bottom: 3px; font-size: 12px; text-align: right; }
    .cal-event { font-size: 9px; padding: 1px 4px; border-radius: 3px; margin-bottom: 1px; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
    .cal-event.deadline { background: rgba(212,117,107,0.15); color: var(--red); }
    .cal-event.goal { background: rgba(184,151,126,0.2); color: #8B6914; }
    .cal-event.completed { opacity: 0.4; text-decoration: line-through; }
    .cal-event.important { background: rgba(27,58,92,0.1); color: var(--navy); }

    /* Day view modal */
    .day-modal { display: none; position: fixed; inset: 0; background: rgba(27,42,56,0.5); z-index: 200; padding: 24px; overflow-y: auto; }
    .day-modal.open { display: flex; align-items: flex-start; justify-content: center; padding-top: 100px; }
    .day-box { background: var(--cream); border-radius: 20px; max-width: 480px; width: 100%; padding: 32px; }
    .day-title { font-family: 'Libre Baskerville', serif; font-size: 26px; font-weight: 400; margin-bottom: 20px; }
    .day-event { display: flex; align-items: flex-start; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .day-event:last-child { border-bottom: none; }
    .day-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
    .day-dot.deadline { background: var(--red); }
    .day-dot.goal { background: var(--gold); }
    .day-dot.important { background: var(--navy); }
    .day-event-title { font-size: 14px; font-weight: 400; }
    .day-event-note { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .day-empty { font-size: 14px; color: var(--muted); font-weight: 300; }

    /* Deadline calculator */
    .calc-section { margin-bottom: 20px; padding: 20px 24px; background: var(--warm-white); border: 1px solid var(--border); border-radius: 16px; }
    .calc-title { font-family: 'Libre Baskerville', serif; font-size: 18px; font-weight: 400; margin-bottom: 12px; }
    .calc-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .calc-input { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--cream); color: var(--text); }

    /* Important dates */
    .date-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .date-item:last-child { border-bottom: none; }
    .date-info { flex: 1; }
    .date-title { font-size: 14px; font-weight: 400; }
    .date-when { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .date-add { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .date-add input { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--cream); color: var(--text); outline: none; }
    .date-add input:focus { border-color: var(--accent); }

    /* Documents needed */
    .doc-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
    .doc-item:last-child { border-bottom: none; }
    .doc-item.gathered .doc-name { text-decoration: line-through; color: var(--muted); }
    .doc-name { font-size: 14px; font-weight: 400; }
    .doc-desc { font-size: 12px; font-weight: 300; color: var(--muted); margin-top: 2px; }

    /* Notes */
    .note-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 10px; }
    .note-content { font-size: 14px; font-weight: 300; line-height: 1.6; white-space: pre-wrap; }
    .note-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
    .note-date { font-size: 11px; color: var(--muted); }
    .note-actions { display: flex; gap: 8px; }
    .note-action { background: none; border: none; color: var(--muted); font-size: 12px; cursor: pointer; padding: 2px 6px; }
    .note-action:hover { color: var(--navy); }
    .note-textarea { width: 100%; min-height: 100px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 300; padding: 14px; border: 1px solid var(--border); border-radius: 12px; background: var(--cream); color: var(--text); resize: vertical; outline: none; line-height: 1.6; }
    .note-textarea:focus { border-color: var(--accent); }

    /* Chat history */
    .session-list { display: flex; flex-direction: column; gap: 8px; }
    .session-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border: 1px solid var(--border); border-radius: 12px; cursor: pointer; transition: all 0.15s; text-decoration: none; color: var(--text); }
    .session-item:hover { border-color: var(--accent); background: var(--cream); }
    .session-preview { font-size: 14px; font-weight: 300; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .session-date { font-size: 12px; color: var(--muted); flex-shrink: 0; margin-left: 12px; }
    .session-cat { display: inline-block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--gold); font-weight: 500; margin-right: 8px; }

    /* Purchases */
    .purchase-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--border); }
    .purchase-item:last-child { border-bottom: none; }
    .purchase-name { font-size: 14px; font-weight: 400; }
    .purchase-date { font-size: 12px; color: var(--muted); }
    .purchase-dl { font-size: 13px; color: var(--accent); text-decoration: underline; cursor: pointer; }
    .purchase-dl:hover { color: var(--accent-light); }

    /* Quick actions */
    .quick-actions { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .quick-btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; border: 1px solid var(--border); border-radius: 8px; background: var(--warm-white); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 400; text-decoration: none; transition: all 0.15s; cursor: pointer; }
    .quick-btn:hover { border-color: var(--accent); background: var(--cream); transform: translateY(-1px); }

    /* Conversation detail modal */
    .conv-modal { display: none; position: fixed; inset: 0; background: rgba(27,42,56,0.5); z-index: 200; padding: 24px; overflow-y: auto; }
    .conv-modal.open { display: flex; align-items: flex-start; justify-content: center; padding-top: 80px; }
    .conv-box { background: var(--cream); border-radius: 20px; max-width: 640px; width: 100%; max-height: 80vh; overflow-y: auto; padding: 32px; }
    .conv-close { float: right; background: none; border: none; font-size: 24px; cursor: pointer; color: var(--muted); padding: 0 8px; }
    .conv-close:hover { color: var(--text); }
    .conv-title { font-family: 'Libre Baskerville', serif; font-size: 24px; font-weight: 400; margin-bottom: 24px; }
    .conv-msg { padding: 12px 16px; border-radius: 14px; margin-bottom: 8px; font-size: 14px; font-weight: 300; line-height: 1.6; max-width: 85%; }
    .conv-msg.user { background: var(--accent); color: var(--cream); margin-left: auto; border-bottom-right-radius: 4px; }
    .conv-msg.assistant { background: var(--warm-white); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

    /* Upcoming deadlines (compact) */
    .upcoming-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .upcoming-item:last-child { border-bottom: none; }
    .upcoming-title { font-size: 13px; font-weight: 400; }
    .upcoming-date { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .upcoming-overdue { color: var(--red); font-weight: 500; }

    /* Delete/action buttons for items */
    .item-actions { display: flex; gap: 4px; flex-shrink: 0; margin-left: auto; }
    .item-del { background: none; border: none; color: var(--muted); font-size: 14px; cursor: pointer; padding: 2px 6px; border-radius: 4px; transition: all 0.15s; line-height: 1; }
    .item-del:hover { color: var(--red); background: rgba(212,117,107,0.1); }
    .item-edit { background: none; border: none; color: var(--muted); font-size: 11px; cursor: pointer; padding: 2px 6px; border-radius: 4px; transition: all 0.15s; }
    .item-edit:hover { color: var(--navy); background: rgba(27,58,92,0.06); }

    /* Calendar layout with sidebar */
    .cal-layout { display: grid; grid-template-columns: 1fr 280px; gap: 20px; max-width: 100%; }
    .cal-sidebar { display: flex; flex-direction: column; gap: 16px; }
    .cal-sidebar-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
    .cal-sidebar-title { font-family: 'Libre Baskerville', serif; font-size: 16px; font-weight: 400; color: var(--navy); margin-bottom: 10px; }
    .cal-event-list-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
    .cal-event-list-item:last-child { border-bottom: none; }
    .cal-event-list-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 3px; flex-shrink: 0; }
    .cal-event-list-info { flex: 1; }
    .cal-event-list-name { font-weight: 400; font-size: 13px; }
    .cal-event-list-date { font-size: 11px; color: var(--muted); }

    /* View toggle for calendar */
    .view-toggle { display: flex; gap: 4px; }
    .view-toggle-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 12px; font-family: 'Plus Jakarta Sans', sans-serif; color: var(--muted); cursor: pointer; transition: all 0.15s; }
    .view-toggle-btn.active { background: var(--accent); color: var(--cream); border-color: var(--accent); }

    /* Activity Log */
    .activity-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 12px; }
    .activity-icon { font-size: 20px; flex-shrink: 0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: var(--cream); border-radius: 8px; }
    .activity-body { flex: 1; }
    .activity-desc { font-size: 14px; font-weight: 400; line-height: 1.5; }
    .activity-meta { font-size: 12px; color: var(--muted); margin-top: 4px; display: flex; gap: 12px; flex-wrap: wrap; }
    .activity-meta span { display: inline-flex; align-items: center; gap: 3px; }
    .activity-date { font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
    .activity-form { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 20px; }
    .activity-form select, .activity-form input, .activity-form textarea { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--cream); color: var(--text); outline: none; }
    .activity-form select:focus, .activity-form input:focus, .activity-form textarea:focus { border-color: var(--accent); }
    .activity-form textarea { min-height: 60px; resize: vertical; }

    /* Guide content library */
    .guide-nav { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .guide-nav-btn { padding: 8px 18px; border: 1px solid var(--border); border-radius: 100px; background: var(--warm-white); color: var(--muted); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.15s; }
    .guide-nav-btn:hover { border-color: var(--gold); color: var(--text); }
    .guide-nav-btn.active { background: var(--navy); color: var(--cream); border-color: var(--navy); }
    .guide-category { margin-bottom: 24px; }
    .guide-cat-header { font-family: 'Libre Baskerville', serif; font-size: 20px; font-weight: 400; color: var(--navy); margin-bottom: 4px; }
    .guide-cat-risk { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 14px; }
    .guide-cat-risk.low { color: var(--green); }
    .guide-cat-risk.medium { color: var(--gold); }
    .guide-cat-risk.high { color: var(--red); }
    .guide-task { background: var(--warm-white); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 10px; overflow: hidden; }

      var d = new Date(iso);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function formatShortDate(iso) {
      if (!iso) return '';
      var d = new Date(iso + 'T00:00:00');

    function daysUntil(dateStr) {
      var target = new Date(dateStr + 'T00:00:00');
      var today = new Date();
      today.setHours(0,0,0,0);
      return Math.ceil((target - today) / (1000 * 60 * 60 * 24));

      });
      // Coming soon pills for transitions not yet loaded

        { key: 'estate', label: 'Death & Estate' },
        { key: 'divorce', label: 'Divorce & Separation' },
        { key: 'disability', label: 'Disability & Benefits' },

      planned.forEach(function(p) {

          html += '<button class="guide-nav-btn" style="opacity:0.5;cursor:default" title="Coming soon">' + p.label + '</button>';

      if (!guideLibrary[key]) return;
      activeGuideTransition = key;
      document.querySelectorAll('.guide-nav-btn').forEach(function(b) {
        b.classList.toggle('active', b.textContent === guideLibrary[key].label);
      });
      renderGuideTransition(key);
    }

    function renderGuideTransition(key) {
      var t = guideLibrary[key];
      var content = document.getElementById('guideContent');
      if (!t || !content) return;

      var html = '';
      t.categories.forEach(function(cat) {
        html += '<div class="guide-category">';
        html += '  <div class="guide-cat-header">' + cat.name + '</div>';
        // Risk levels hidden from users — internal use only

        cat.tasks.forEach(function(task) {
          html += '<div class="guide-task" id="guide-' + task.id + '">';
          html += '  <div class="guide-task-header" onclick="toggleGuideTask(\'' + task.id + '\')">';
          html += '    <span class="guide-task-title">' + task.title + '</span>';
          // Risk badges hidden — internal use only
          html += '    <span class="guide-chevron">\u25BE</span>';
          html += '  </div>';
          html += '  <div class="guide-task-body">';

          // What + Why
          if (task.what) html += '<div class="guide-what">' + task.what + '</div>';
          if (task.why) html += '<div class="guide-why">' + task.why + '</div>';

          // Steps
          if (task.steps && task.steps.length > 0) {
            html += '<div class="guide-section-label">Steps</div>';
            html += '<ol class="guide-steps">';
            task.steps.forEach(function(s) { html += '<li>' + s + '</li>'; });
            html += '</ol>';
          }

          // Terms
          if (task.terms && task.terms.length > 0) {
            html += '<div class="guide-section-label">Key Terms</div>';
            html += '<div class="guide-terms">';
            task.terms.forEach(function(t) {
              html += '<div class="guide-term"><strong>' + t.term + '</strong> <span>' + t.def + '</span></div>';
            });
            html += '</div>';
          }

          // Contacts
          if (task.contacts) {
            html += '<div class="guide-section-label">Who to Contact</div>';
            html += '<div class="guide-contact">' + task.contacts + '</div>';
          }

          // Mistakes
          if (task.mistakes && task.mistakes.length > 0) {
            html += '<div class="guide-section-label">Common Mistakes</div>';
            html += '<ul class="guide-mistakes">';
            task.mistakes.forEach(function(m) { html += '<li>' + m + '</li>'; });
            html += '</ul>';
          }

          // Cross-references
          if (task.crossRef && task.crossRef.length > 0) {
            html += '<div class="guide-cross">';
            task.crossRef.forEach(function(cr) { html += '<span class="guide-cross-tag">Also relevant: ' + cr + '</span>'; });
            html += '</div>';
          }

          html += '  </div>'; // task-body
          html += '</div>'; // guide-task
        });

        html += '</div>'; // guide-category
      });

      content.innerHTML = html;
    }

    function toggleGuideTask(id) {
      var el = document.getElementById('guide-' + id);
      if (el) el.classList.toggle('open');
    }

    function saveSettings(e) {
      e.preventDefault();
      var name = document.getElementById('settingsName').value.trim();
      var state = document.getElementById('settingsState').value;
      fetch('/api/account/settings', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({display_name: name, us_state: state})
      }).then(function(r) { return r.json(); }).then(function(data) {
        if (data.ok) {
          // Update local data and re-render greeting
          dashData.user.display_name = name;
          dashData.user.us_state = state;
          var greeting = document.querySelector('.dash-greeting');
          if (greeting) greeting.textContent = 'Welcome back, ' + (name || dashData.user.email.split('@')[0]);
          var saved = document.getElementById('settingsSaved');
          if (saved) { saved.style.opacity = '1'; setTimeout(function(){ saved.style.opacity = '0'; }, 2000); }
        }
      });
    }

    // ── File Upload Functions ──
    var userFiles = [];

    function loadUserFiles() {
      fetch('/api/files').then(function(r) { return r.json(); }).then(function(data) {
        userFiles = data.files || [];
        renderUserFiles();
      });
    }

    function renderUserFiles() {
      var container = document.getElementById('myFilesContainer');
      if (!container) return;
      if (userFiles.length === 0) {
        container.innerHTML = '<p class="card-empty">No files uploaded yet. Upload documents to keep everything in one place.</p>';
        return;
      }
      var groups = {};
      userFiles.forEach(function(f) {
        var cat = f.category || 'other';
        if (!groups[cat]) groups[cat] = [];
        groups[cat].push(f);
      });
      var catLabels = {legal:'Legal', financial:'Financial', insurance:'Insurance', medical:'Medical', personal:'Personal', other:'Other'};
      var html = '';
      Object.keys(groups).sort().forEach(function(cat) {
        html += '<div style="margin-bottom:16px">';
        html += '<div style="font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);margin-bottom:8px">' + (catLabels[cat] || cat) + '</div>';
        groups[cat].forEach(function(f) {
          var icon = '\uD83D\uDCCE';
          var ext = f.original_name.split('.').pop().toLowerCase();
          if (ext === 'pdf') icon = '\uD83D\uDCC4';
          else if (['doc','docx','txt'].indexOf(ext) >= 0) icon = '\uD83D\uDCDD';
          else if (['jpg','jpeg','png','gif'].indexOf(ext) >= 0) icon = '\uD83D\uDDBC\uFE0F';
          else if (['xlsx','xls','csv'].indexOf(ext) >= 0) icon = '\uD83D\uDCCA';
          var size = f.file_size < 1024 ? f.file_size + ' B' :
                     f.file_size < 1048576 ? (f.file_size / 1024).toFixed(1) + ' KB' :
                     (f.file_size / 1048576).toFixed(1) + ' MB';
          html += '<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">';
          html += '  <span style="font-size:20px">' + icon + '</span>';
          html += '  <div style="flex:1;min-width:0">';
          html += '    <div style="font-size:14px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + f.original_name + '</div>';
          html += '    <div style="font-size:11px;color:var(--muted)">' + size + ' \u00B7 ' + formatDate(f.uploaded_at) + '</div>';
          html += '  </div>';
          html += '  <a href="/api/files/' + f.id + '/download" style="font-size:12px;color:var(--navy);text-decoration:none;padding:4px 10px;border:1px solid var(--border);border-radius:6px">Download</a>';
          html += '  <button onclick="deleteFile(' + f.id + ')" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px" title="Delete">\u00D7</button>';
          html += '</div>';
        });
        html += '</div>';
      });
      container.innerHTML = html;
    }

    function uploadFile() {
      var input = document.getElementById('fileUploadInput');
      var category = document.getElementById('fileCategory').value;
      if (!input.files || !input.files[0]) { alert('Please select a file first.'); return; }
      var formData = new FormData();
      formData.append('file', input.files[0]);
      formData.append('category', category);
      var btn = document.getElementById('uploadBtn');
      btn.textContent = 'Uploading...';
      btn.disabled = true;
      fetch('/api/files/upload', { method: 'POST', body: formData })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          btn.textContent = 'Upload'; btn.disabled = false;
          input.value = '';
          document.getElementById('dropZoneText').textContent = 'Drop files here or click to browse';
          if (data.ok) { loadUserFiles(); }
          else { alert(data.error || 'Upload failed'); }
        }).catch(function() { btn.textContent = 'Upload'; btn.disabled = false; alert('Upload failed'); });
    }

    function deleteFile(id) {
      if (!confirm('Delete this file?')) return;
      fetch('/api/files/' + id, { method: 'DELETE' }).then(function(r) { return r.json(); }).then(function(data) {
        if (data.ok) loadUserFiles();
      });
    }

    function loadDashboard() {
      Promise.all([
        fetch('/api/dashboard/data').then(function(r) { return r.json(); }),
        fetch('/api/checklist').then(function(r) { return r.json(); }),
        fetch('/api/activity-log').then(function(r) { return r.json(); })
      ]).then(function(results) {
        dashData = results[0];
        checklistItems = results[1].items || [];
        activityLog = results[2].entries || [];
        renderDashboard();
        loadUserFiles();
      }).catch(function(err) {
        document.getElementById('loadingState').textContent = 'Failed to load dashboard. Please refresh.';
      });
    }

    function getProgress() {
      var total = checklistItems.length;
      var completed = checklistItems.filter(function(i) { return i.is_completed; }).length;
      var pct = total > 0 ? Math.round((completed / total) * 100) : 0;
      return { total: total, completed: completed, pct: pct };
    }

    function progressRingHTML(id, prog) {
      var circumference = 2 * Math.PI * 30;
      var offset = circumference - (prog.pct / 100) * circumference;
      var h = '';
      h += '<div class="progress-row">';
      h += '  <div class="progress-ring" id="' + id + 'Ring">';
      h += '    <svg width="72" height="72"><circle class="bg" cx="36" cy="36" r="30"/><circle class="fill" id="' + id + 'Fill" cx="36" cy="36" r="30" stroke-dasharray="' + circumference + '" stroke-dashoffset="' + offset + '"/></svg>';
      h += '    <div class="progress-pct" id="' + id + 'Pct">' + prog.pct + '%</div>';
      h += '  </div>';
      h += '  <div class="progress-info" id="' + id + 'Info"><strong>' + prog.completed + ' of ' + prog.total + '</strong> tasks completed</div>';
      h += '</div>';
      return h;
    }

    // ── Calendar ──
    // Global events map for day view
    var calEvents = {};

    function buildEventMap() {
      calEvents = {};
      var deadlines = dashData.deadlines || [];
      var goals = dashData.goals || [];
      deadlines.forEach(function(d) {
        if (!calEvents[d.deadline_date]) calEvents[d.deadline_date] = [];
        var type = d.source === 'manual' ? 'important' : 'deadline';
        calEvents[d.deadline_date].push({ type: type, title: d.title, note: d.note || '', completed: d.is_completed, id: d.id });
      });
      goals.forEach(function(g) {
        if (g.target_date) {
          if (!calEvents[g.target_date]) calEvents[g.target_date] = [];
          calEvents[g.target_date].push({ type: 'goal', title: g.title, note: '', completed: g.is_completed, id: g.id });
        }
      });
    }

    function renderCalendar() {
      var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      var label = document.getElementById('calMonthLabel');
      if (label) label.textContent = months[calMonth] + ' ' + calYear;

      var grid = document.getElementById('calGrid');
      if (!grid) return;

      buildEventMap();

      var firstDay = new Date(calYear, calMonth, 1);
      var lastDay = new Date(calYear, calMonth + 1, 0);
      var startDay = firstDay.getDay();
      var daysInMonth = lastDay.getDate();

      var today = new Date();
      today.setHours(0,0,0,0);
      var todayStr = today.toISOString().split('T')[0];

      var h = '';
      var dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      dayNames.forEach(function(d) { h += '<div class="cal-header">' + d + '</div>'; });

      // Previous month days
      var prevMonth = new Date(calYear, calMonth, 0);
      for (var i = startDay - 1; i >= 0; i--) {
        var day = prevMonth.getDate() - i;
        h += '<div class="cal-day other-month"><div class="cal-day-num">' + day + '</div></div>';
      }

      // Current month days
      for (var d = 1; d <= daysInMonth; d++) {
        var dateStr = calYear + '-' + String(calMonth + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
        var isToday = dateStr === todayStr;
        h += '<div class="cal-day' + (isToday ? ' today' : '') + '" onclick="openDayView(\'' + dateStr + '\')">';
        h += '<div class="cal-day-num">' + d + '</div>';
        if (calEvents[dateStr]) {
          calEvents[dateStr].slice(0, 3).forEach(function(ev) {
            var cls = ev.type + (ev.completed ? ' completed' : '');
            h += '<div class="cal-event ' + cls + '" title="' + ev.title.replace(/"/g, '&quot;') + '">' + ev.title + '</div>';
          });
          if (calEvents[dateStr].length > 3) {
            h += '<div class="cal-event" style="color:var(--muted);background:none">+' + (calEvents[dateStr].length - 3) + ' more</div>';
          }
        }
        h += '</div>';
      }

      // Next month days
      var totalCells = startDay + daysInMonth;
      var remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
      for (var i = 1; i <= remaining; i++) {
        h += '<div class="cal-day other-month"><div class="cal-day-num">' + i + '</div></div>';
      }

      grid.innerHTML = h;
    }

    function changeMonth(dir) {
      calMonth += dir;
      if (calMonth > 11) { calMonth = 0; calYear++; }
      if (calMonth < 0) { calMonth = 11; calYear--; }
      renderCalendar();
    }

    // ── Day view ──
    function openDayView(dateStr) {
      var d = new Date(dateStr + 'T00:00:00');

      var eventsDiv = document.getElementById('dayEvents');

      var h = '';

        evts.forEach(function(ev) {

            var noteHtml = ev.note.replace(/Docs:/g, '<br><strong style="color:var(--navy);font-size:11px">DOCS NEEDED:</strong>').replace(/Contact:/g, '<br><strong style="color:var(--navy);font-size:11px">CONTACT:</strong>');

          h += '    <button class="item-del" onclick="' + delFn + '(' + ev.id + ');closeDayView()" title="Delete">&times;</button>';

    // ── Progress updates ──
    function updateProgressUI() {
      var prog = getProgress();
      var circumference = 2 * Math.PI * 30;
      var offset = circumference - (prog.pct / 100) * circumference;
      // Update sidebar progress ring
      var fill = document.getElementById('progressFill');
      var pct = document.getElementById('progressPct');
      var info = document.getElementById('progressInfo');
      if (fill) fill.setAttribute('stroke-dashoffset', offset);
      if (pct) pct.textContent = prog.pct + '%';
      if (info) info.innerHTML = '<strong>' + prog.completed + '/' + prog.total + '</strong> tasks';
      // Update checklist tab progress
      var clFill = document.getElementById('clFill');
      var clPct = document.getElementById('clPct');
      var clInfo = document.getElementById('clInfo');
      if (clFill) clFill.setAttribute('stroke-dashoffset', offset);
      if (clPct) clPct.textContent = prog.pct + '%';
      if (clInfo) clInfo.innerHTML = '<strong>' + prog.completed + ' of ' + prog.total + '</strong> tasks completed';
      // Update tab badge
      var clTab = document.querySelector('[data-tab="checklist"]');
      if (clTab) {
        var badge = clTab.querySelector('.tab-badge');
        if (badge) badge.textContent = prog.completed + '/' + prog.total;
      }
    }

          html += '<div class="conv-msg ' + m.role + '">' + m.content.replace(/</g, '&lt;').replace(/\n/g, '<br>') + '</div>';
        });
        if (!html) html = '<p class="card-empty">No messages found for this session.</p>';
        document.getElementById('convMessages').innerHTML = html;
      });
    }

    function closeConv() {
      document.getElementById('convModal').classList.remove('open');
    }

    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') { closeConv(); closeDayView(); } });

    loadDashboard();

    // Drag and drop for file upload
    document.addEventListener('dragover', function(e) {
      var dz = document.getElementById('dropZone');
      if (dz) { e.preventDefault(); dz.style.borderColor = 'var(--accent)'; dz.style.background = 'var(--warm-white)'; }
    });
    document.addEventListener('dragleave', function(e) {
      var dz = document.getElementById('dropZone');
      if (dz) { dz.style.borderColor = 'var(--border)'; dz.style.background = 'var(--cream)'; }
    });
    document.addEventListener('drop', function(e) {
      e.preventDefault();
      var dz = document.getElementById('dropZone');
      if (dz) { dz.style.borderColor = 'var(--border)'; dz.style.background = 'var(--cream)'; }
      var input = document.getElementById('fileUploadInput');
      if (input && e.dataTransfer.files.length > 0) {
        input.files = e.dataTransfer.files;
        document.getElementById('dropZoneText').textContent = e.dataTransfer.files[0].name;
      }
    });
  </script>
</body>
</html>
