<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Dashboard — Lumeway</title>
  <meta name="description" content="Track your transition progress, view past conversations, and manage your checklist."/>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --cream: #FAF7F2; --warm-white: #FDFCFA; --text: #2C3E50; --muted: #6B7B8D; --navy: #2C4A5E; --gold: #B8977E; --accent: #C4704E; --accent-light: #D4896C; --border: #E8E0D6; --green: #6B8F5E; --red: #C4704E; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--cream); color: var(--text); -webkit-font-smoothing: antialiased; }

    /* Nav */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 20px 48px; display: flex; align-items: center; justify-content: space-between; background: rgba(247,244,239,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo-icon { width: 32px; height: 32px; background: var(--navy); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--cream); font-family: 'Libre Baskerville', serif; font-size: 18px; font-weight: 500; }
    .nav-logo-text { font-family: 'Libre Baskerville', serif; font-size: 20px; font-weight: 500; color: var(--text); }
    .nav-right { display: flex; gap: 12px; align-items: center; }
    .btn-ghost { padding: 8px 20px; border: 1px solid var(--border); border-radius: 8px; background: transparent; color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; text-decoration: none; transition: all 0.2s; cursor: pointer; }
    .btn-ghost:hover { background: var(--accent); color: var(--cream); border-color: var(--accent); }
    .btn-primary { padding: 8px 20px; border: none; border-radius: 8px; background: var(--accent); color: var(--cream); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; text-decoration: none; transition: all 0.2s; cursor: pointer; }
    .btn-primary:hover { background: var(--accent-light); }

    /* Dashboard layout */
    .dash { max-width: 1100px; margin: 0 auto; padding: 100px 24px 64px; }
    .dash-header { margin-bottom: 32px; }
    .dash-greeting { font-family: 'Libre Baskerville', serif; font-size: clamp(32px, 5vw, 44px); font-weight: 300; line-height: 1.15; margin-bottom: 8px; }
    .dash-sub { font-size: 15px; font-weight: 300; color: var(--muted); }

    /* Tabs */
    .dash-tabs { display: flex; gap: 4px; margin-bottom: 28px; border-bottom: 1px solid var(--border); }
    .dash-tab { padding: 12px 24px; background: none; border: none; border-bottom: 2px solid transparent; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 400; color: var(--muted); cursor: pointer; transition: all 0.15s; }
    .dash-tab:hover { color: var(--text); }
    .dash-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
    .dash-tab .tab-badge { display: inline-flex; align-items: center; justify-content: center; background: var(--accent); color: white; font-size: 10px; font-weight: 600; min-width: 18px; height: 18px; border-radius: 9px; margin-left: 6px; padding: 0 5px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Cards */
    .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    .dash-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    .dash-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 16px; padding: 28px; }
    .dash-card-full { grid-column: 1 / -1; }
    .card-label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
    .card-title { font-family: 'Libre Baskerville', serif; font-size: 24px; font-weight: 400; margin-bottom: 8px; }
    .card-empty { font-size: 14px; font-weight: 300; color: var(--muted); line-height: 1.6; }

    /* Overview layout: sidebar with progress */
    .overview-layout { display: grid; grid-template-columns: 1fr 200px; gap: 20px; margin-bottom: 24px; }
    .overview-main { display: flex; flex-direction: column; gap: 20px; }
    .overview-sidebar { display: flex; flex-direction: column; gap: 16px; }
    .progress-compact { background: var(--warm-white); border: 1px solid var(--border); border-radius: 16px; padding: 20px; text-align: center; }

    /* Progress ring */
    .progress-row { display: flex; align-items: center; gap: 20px; }
    .progress-ring { width: 72px; height: 72px; position: relative; flex-shrink: 0; margin: 0 auto; }
    .progress-ring svg { transform: rotate(-90deg); }
    .progress-ring circle { fill: none; stroke-width: 6; }
    .progress-ring .bg { stroke: var(--border); }
    .progress-ring .fill { stroke: var(--green); stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
    .progress-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 500; color: var(--navy); }
    .progress-info { font-size: 12px; font-weight: 300; color: var(--muted); line-height: 1.5; margin-top: 8px; }
    .progress-info strong { color: var(--text); font-weight: 500; }

    /* Checklist */
    .checklist-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .checklist-category { background: var(--warm-white); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
    .category-header { font-family: 'Libre Baskerville', serif; font-size: 20px; font-weight: 400; color: var(--navy); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .phase-title { font-size: 12px; font-weight: 500; color: var(--gold); margin: 14px 0 6px; text-transform: uppercase; letter-spacing: 0.06em; }
    .check-item { display: flex; align-items: flex-start; gap: 10px; padding: 7px 0; cursor: pointer; }
    .check-box { width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 6px; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .check-item.done .check-box { background: var(--green); border-color: var(--green); }
    .check-item.done .check-box::after { content: '\2713'; color: white; font-size: 12px; font-weight: 600; }
    .check-item.done .check-text { text-decoration: line-through; color: var(--muted); }
    .check-text { font-size: 13px; font-weight: 300; line-height: 1.5; }

    /* Single column checklist when only one category */
    .checklist-single { max-width: 640px; }

    /* Checklist init */
    .init-checklist { margin-top: 20px; padding: 20px 24px; background: var(--warm-white); border: 1px solid var(--border); border-radius: 16px; }
    .init-label { font-size: 13px; font-weight: 400; color: var(--text); margin-bottom: 10px; }
    .init-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .init-select { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--cream); color: var(--text); }
    .init-btn { padding: 10px 20px; border: none; border-radius: 8px; background: var(--accent); color: var(--cream); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
    .init-btn:hover { background: var(--accent-light); }

    /* Goals */
    .goal-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .goal-item:last-child { border-bottom: none; }
    .goal-item.done .check-box { background: var(--green); border-color: var(--green); }
    .goal-item.done .goal-text { text-decoration: line-through; color: var(--muted); }
    .goal-text { font-size: 14px; font-weight: 300; line-height: 1.5; flex: 1; cursor: pointer; }
    .goal-date { font-size: 11px; color: var(--muted); white-space: nowrap; margin-top: 2px; }
    .goal-add { display: flex; gap: 8px; margin-top: 12px; }
    .goal-input { flex: 1; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; padding: 8px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--cream); color: var(--text); outline: none; }
    .goal-input:focus { border-color: var(--accent); }

    /* Calendar — Apple Calendar style */
    .cal-card { padding: 16px; }
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .cal-month { font-family: 'Libre Baskerville', serif; font-size: 24px; font-weight: 400; }
    .cal-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 14px; color: var(--text); transition: all 0.15s; }
    .cal-btn:hover { background: var(--cream); border-color: var(--gold); }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-left: 1px solid var(--border); border-top: 1px solid var(--border); width: 100%; }
    .cal-header { text-align: center; font-size: 11px; font-weight: 500; color: var(--muted); padding: 10px 0; text-transform: uppercase; letter-spacing: 0.05em; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); background: var(--cream); }
    .cal-day { height: 110px; background: var(--warm-white); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 4px 6px; font-size: 12px; position: relative; cursor: pointer; overflow: hidden; }
    .cal-day:hover { background: rgba(184,151,126,0.06); }
    .cal-day.today { background: rgba(27,58,92,0.04); }
    .cal-day.today .cal-day-num { background: var(--navy); color: var(--cream); border-radius: 50%; width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; }
    .cal-day.other-month { background: var(--cream); }
    .cal-day.other-month .cal-day-num { color: var(--border); }
    .cal-day-num { font-weight: 500; color: var(--text); margin-bottom: 3px; font-size: 12px; text-align: right; }
    .cal-event { font-size: 9px; padding: 1px 4px; border-radius: 3px; margin-bottom: 1px; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
    .cal-event.deadline { background: rgba(212,117,107,0.15); color: var(--red); }
    .cal-event.goal { background: rgba(184,151,126,0.2); color: #8B6914; }
    .cal-event.completed { opacity: 0.4; text-decoration: line-through; }
    .cal-event.important { background: rgba(27,58,92,0.1); color: var(--navy); }

    /* Day view modal */
    .day-modal { display: none; position: fixed; inset: 0; background: rgba(27,42,56,0.5); z-index: 200; padding: 24px; overflow-y: auto; }
    .day-modal.open { display: flex; align-items: flex-start; justify-content: center; padding-top: 100px; }
    .day-box { background: var(--cream); border-radius: 20px; max-width: 480px; width: 100%; padding: 32px; }
    .day-title { font-family: 'Libre Baskerville', serif; font-size: 26px; font-weight: 400; margin-bottom: 20px; }
    .day-event { display: flex; align-items: flex-start; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .day-event:last-child { border-bottom: none; }
    .day-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
    .day-dot.deadline { background: var(--red); }
    .day-dot.goal { background: var(--gold); }
    .day-dot.important { background: var(--navy); }
    .day-event-title { font-size: 14px; font-weight: 400; }
    .day-event-note { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .day-empty { font-size: 14px; color: var(--muted); font-weight: 300; }

    /* Deadline calculator */
    .calc-section { margin-bottom: 20px; padding: 20px 24px; background: var(--warm-white); border: 1px solid var(--border); border-radius: 16px; }
    .calc-title { font-family: 'Libre Baskerville', serif; font-size: 18px; font-weight: 400; margin-bottom: 12px; }
    .calc-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .calc-input { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--cream); color: var(--text); }

    /* Important dates */
    .date-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .date-item:last-child { border-bottom: none; }
    .date-info { flex: 1; }
    .date-title { font-size: 14px; font-weight: 400; }
    .date-when { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .date-add { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .date-add input { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--cream); color: var(--text); outline: none; }
    .date-add input:focus { border-color: var(--accent); }

    /* Documents needed */
    .doc-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
    .doc-item:last-child { border-bottom: none; }
    .doc-item.gathered .doc-name { text-decoration: line-through; color: var(--muted); }
    .doc-name { font-size: 14px; font-weight: 400; }
    .doc-desc { font-size: 12px; font-weight: 300; color: var(--muted); margin-top: 2px; }

    /* Notes */
    .note-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 10px; }
    .note-content { font-size: 14px; font-weight: 300; line-height: 1.6; white-space: pre-wrap; }
    .note-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
    .note-date { font-size: 11px; color: var(--muted); }
    .note-actions { display: flex; gap: 8px; }
    .note-action { background: none; border: none; color: var(--muted); font-size: 12px; cursor: pointer; padding: 2px 6px; }
    .note-action:hover { color: var(--navy); }
    .note-textarea { width: 100%; min-height: 100px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 300; padding: 14px; border: 1px solid var(--border); border-radius: 12px; background: var(--cream); color: var(--text); resize: vertical; outline: none; line-height: 1.6; }
    .note-textarea:focus { border-color: var(--accent); }

    /* Chat history */
    .session-list { display: flex; flex-direction: column; gap: 8px; }
    .session-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border: 1px solid var(--border); border-radius: 12px; cursor: pointer; transition: all 0.15s; text-decoration: none; color: var(--text); }
    .session-item:hover { border-color: var(--accent); background: var(--cream); }
    .session-preview { font-size: 14px; font-weight: 300; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .session-date { font-size: 12px; color: var(--muted); flex-shrink: 0; margin-left: 12px; }
    .session-cat { display: inline-block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--gold); font-weight: 500; margin-right: 8px; }

    /* Purchases */
    .purchase-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--border); }
    .purchase-item:last-child { border-bottom: none; }
    .purchase-name { font-size: 14px; font-weight: 400; }
    .purchase-date { font-size: 12px; color: var(--muted); }
    .purchase-dl { font-size: 13px; color: var(--accent); text-decoration: underline; cursor: pointer; }
    .purchase-dl:hover { color: var(--accent-light); }

    /* Quick actions */
    .quick-actions { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .quick-btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; border: 1px solid var(--border); border-radius: 8px; background: var(--warm-white); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 400; text-decoration: none; transition: all 0.15s; cursor: pointer; }
    .quick-btn:hover { border-color: var(--accent); background: var(--cream); transform: translateY(-1px); }

    /* Conversation detail modal */
    .conv-modal { display: none; position: fixed; inset: 0; background: rgba(27,42,56,0.5); z-index: 200; padding: 24px; overflow-y: auto; }
    .conv-modal.open { display: flex; align-items: flex-start; justify-content: center; padding-top: 80px; }
    .conv-box { background: var(--cream); border-radius: 20px; max-width: 640px; width: 100%; max-height: 80vh; overflow-y: auto; padding: 32px; }
    .conv-close { float: right; background: none; border: none; font-size: 24px; cursor: pointer; color: var(--muted); padding: 0 8px; }
    .conv-close:hover { color: var(--text); }
    .conv-title { font-family: 'Libre Baskerville', serif; font-size: 24px; font-weight: 400; margin-bottom: 24px; }
    .conv-msg { padding: 12px 16px; border-radius: 14px; margin-bottom: 8px; font-size: 14px; font-weight: 300; line-height: 1.6; max-width: 85%; }
    .conv-msg.user { background: var(--accent); color: var(--cream); margin-left: auto; border-bottom-right-radius: 4px; }
    .conv-msg.assistant { background: var(--warm-white); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

    /* Upcoming deadlines (compact) */
    .upcoming-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .upcoming-item:last-child { border-bottom: none; }
    .upcoming-title { font-size: 13px; font-weight: 400; }
    .upcoming-date { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .upcoming-overdue { color: var(--red); font-weight: 500; }

    /* Delete/action buttons for items */
    .item-actions { display: flex; gap: 4px; flex-shrink: 0; margin-left: auto; }
    .item-del { background: none; border: none; color: var(--muted); font-size: 14px; cursor: pointer; padding: 2px 6px; border-radius: 4px; transition: all 0.15s; line-height: 1; }
    .item-del:hover { color: var(--red); background: rgba(212,117,107,0.1); }
    .item-edit { background: none; border: none; color: var(--muted); font-size: 11px; cursor: pointer; padding: 2px 6px; border-radius: 4px; transition: all 0.15s; }
    .item-edit:hover { color: var(--navy); background: rgba(27,58,92,0.06); }

    /* Calendar layout with sidebar */
    .cal-layout { display: grid; grid-template-columns: 1fr 280px; gap: 20px; max-width: 100%; }
    .cal-sidebar { display: flex; flex-direction: column; gap: 16px; }
    .cal-sidebar-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
    .cal-sidebar-title { font-family: 'Libre Baskerville', serif; font-size: 16px; font-weight: 400; color: var(--navy); margin-bottom: 10px; }
    .cal-event-list-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
    .cal-event-list-item:last-child { border-bottom: none; }
    .cal-event-list-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 3px; flex-shrink: 0; }
    .cal-event-list-info { flex: 1; }
    .cal-event-list-name { font-weight: 400; font-size: 13px; }
    .cal-event-list-date { font-size: 11px; color: var(--muted); }

    /* View toggle for calendar */
    .view-toggle { display: flex; gap: 4px; }
    .view-toggle-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 12px; font-family: 'Plus Jakarta Sans', sans-serif; color: var(--muted); cursor: pointer; transition: all 0.15s; }
    .view-toggle-btn.active { background: var(--accent); color: var(--cream); border-color: var(--accent); }

    /* Activity Log */
    .activity-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 12px; }
    .activity-icon { font-size: 20px; flex-shrink: 0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: var(--cream); border-radius: 8px; }
    .activity-body { flex: 1; }
    .activity-desc { font-size: 14px; font-weight: 400; line-height: 1.5; }
    .activity-meta { font-size: 12px; color: var(--muted); margin-top: 4px; display: flex; gap: 12px; flex-wrap: wrap; }
    .activity-meta span { display: inline-flex; align-items: center; gap: 3px; }
    .activity-date { font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
    .activity-form { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 20px; }
    .activity-form select, .activity-form input, .activity-form textarea { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--cream); color: var(--text); outline: none; }
    .activity-form select:focus, .activity-form input:focus, .activity-form textarea:focus { border-color: var(--accent); }
    .activity-form textarea { min-height: 60px; resize: vertical; }

    /* Loading */
    .loading { text-align: center; padding: 48px; color: var(--muted); font-size: 15px; font-weight: 300; }

    /* Responsive */
    @media (max-width: 900px) {
      .checklist-cols { grid-template-columns: 1fr; }
      .dash-grid-3 { grid-template-columns: 1fr; }
      .cal-layout { grid-template-columns: 1fr; }
      .overview-layout { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      nav { padding: 14px 20px; }
      .nav-right { gap: 8px; }
      .dash { padding: 85px 16px 48px; }
      .dash-grid { grid-template-columns: 1fr; }
      .dash-tabs { overflow-x: auto; }
      .dash-tab { padding: 12px 14px; white-space: nowrap; font-size: 13px; }
      .cal-day { height: 80px; }
      .cal-event { font-size: 9px; }
      .cal-day-num { font-size: 12px; }
      .cal-day.today .cal-day-num { width: 22px; height: 22px; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">
      <span style="color:var(--accent)"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M2 12h3M19 12h3M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12"/></svg></span>
      <span class="nav-logo-text" style="font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase">Lumeway</span>
    </a>
    <div class="nav-right">
      <a href="/chat" target="_blank" class="btn-primary">Open Navigator</a>
      <button class="btn-ghost" onclick="logout()">Log out</button>
    </div>
  </nav>

  <div class="dash" id="dashContent">
    <div class="loading" id="loadingState">Loading your dashboard...</div>
  </div>

  <div class="day-modal" id="dayModal" onclick="if(event.target===this)closeDayView()">
    <div class="day-box">
      <button class="conv-close" onclick="closeDayView()">&times;</button>
      <h2 class="day-title" id="dayTitle"></h2>
      <div id="dayEvents"></div>
    </div>
  </div>

  <div class="conv-modal" id="convModal" onclick="if(event.target===this)closeConv()">
    <div class="conv-box">
      <button class="conv-close" onclick="closeConv()">&times;</button>
      <h2 class="conv-title">Conversation</h2>
      <div id="convMessages"></div>
    </div>
  </div>

  <script>
    var dashData = null;
    var checklistItems = [];
    var activityLog = [];
    var currentTab = 'overview';
    var calMonth = new Date().getMonth();
    var calYear = new Date().getFullYear();

    function formatDate(iso) {
      if (!iso) return '';
      var d = new Date(iso);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function formatShortDate(iso) {
      if (!iso) return '';
      var d = new Date(iso + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function daysUntil(dateStr) {
      var target = new Date(dateStr + 'T00:00:00');
      var today = new Date();
      today.setHours(0,0,0,0);
      return Math.ceil((target - today) / (1000 * 60 * 60 * 24));
    }

    function logout() {
      fetch('/api/auth/logout', { method: 'POST' }).then(function() {
        window.location.href = '/';
      });
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.dash-tab').forEach(function(t) {
        t.classList.toggle('active', t.dataset.tab === tab);
      });
      document.querySelectorAll('.tab-panel').forEach(function(p) {
        p.classList.toggle('active', p.id === 'panel-' + tab);
      });
    }

    function saveSettings(e) {
      e.preventDefault();
      var name = document.getElementById('settingsName').value.trim();
      var state = document.getElementById('settingsState').value;
      fetch('/api/account/settings', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({display_name: name, us_state: state})
      }).then(function(r) { return r.json(); }).then(function(data) {
        if (data.ok) {
          // Update local data and re-render greeting
          dashData.user.display_name = name;
          dashData.user.us_state = state;
          var greeting = document.querySelector('.dash-greeting');
          if (greeting) greeting.textContent = 'Welcome back, ' + (name || dashData.user.email.split('@')[0]);
          var saved = document.getElementById('settingsSaved');
          if (saved) { saved.style.opacity = '1'; setTimeout(function(){ saved.style.opacity = '0'; }, 2000); }
        }
      });
    }

    function loadDashboard() {
      Promise.all([
        fetch('/api/dashboard/data').then(function(r) { return r.json(); }),
        fetch('/api/checklist').then(function(r) { return r.json(); }),
        fetch('/api/activity-log').then(function(r) { return r.json(); })
      ]).then(function(results) {
        dashData = results[0];
        checklistItems = results[1].items || [];
        activityLog = results[2].entries || [];
        renderDashboard();
      }).catch(function(err) {
        document.getElementById('loadingState').textContent = 'Failed to load dashboard. Please refresh.';
      });
    }

    function getProgress() {
      var total = checklistItems.length;
      var completed = checklistItems.filter(function(i) { return i.is_completed; }).length;
      var pct = total > 0 ? Math.round((completed / total) * 100) : 0;
      return { total: total, completed: completed, pct: pct };
    }

    function progressRingHTML(id, prog) {
      var circumference = 2 * Math.PI * 30;
      var offset = circumference - (prog.pct / 100) * circumference;
      var h = '';
      h += '<div class="progress-row">';
      h += '  <div class="progress-ring" id="' + id + 'Ring">';
      h += '    <svg width="72" height="72"><circle class="bg" cx="36" cy="36" r="30"/><circle class="fill" id="' + id + 'Fill" cx="36" cy="36" r="30" stroke-dasharray="' + circumference + '" stroke-dashoffset="' + offset + '"/></svg>';
      h += '    <div class="progress-pct" id="' + id + 'Pct">' + prog.pct + '%</div>';
      h += '  </div>';
      h += '  <div class="progress-info" id="' + id + 'Info"><strong>' + prog.completed + ' of ' + prog.total + '</strong> tasks completed</div>';
      h += '</div>';
      return h;
    }

    function renderDashboard() {
      var u = dashData.user;
      var sessions = dashData.sessions || [];
      var purchases = dashData.purchases || [];
      var goals = dashData.goals || [];
      var deadlines = dashData.deadlines || [];
      var documents = dashData.documents_needed || [];
      var notes = dashData.notes || [];
      var prog = getProgress();
      var name = u.display_name || u.email.split('@')[0];

      var html = '';
      html += '<div class="dash-header">';
      html += '  <h1 class="dash-greeting">Welcome back, ' + name + '</h1>';
      html += '  <p class="dash-sub">' + u.email + '</p>';
      html += '</div>';

      // Tabs
      html += '<div class="dash-tabs">';
      html += '  <button class="dash-tab active" data-tab="overview" onclick="switchTab(\'overview\')">Overview</button>';
      html += '  <button class="dash-tab" data-tab="checklist" onclick="switchTab(\'checklist\')">Checklist';
      if (prog.total > 0) html += ' <span class="tab-badge">' + prog.completed + '/' + prog.total + '</span>';
      html += '</button>';
      html += '  <button class="dash-tab" data-tab="calendar" onclick="switchTab(\'calendar\')">Calendar';
      if (deadlines.length > 0) html += ' <span class="tab-badge">' + deadlines.filter(function(d){return !d.is_completed;}).length + '</span>';
      html += '</button>';
      html += '  <button class="dash-tab" data-tab="documents" onclick="switchTab(\'documents\')">Documents';
      if (documents.length > 0) html += ' <span class="tab-badge">' + documents.filter(function(d){return !d.is_gathered;}).length + '</span>';
      html += '</button>';
      html += '  <button class="dash-tab" data-tab="notes" onclick="switchTab(\'notes\')">Notes</button>';
      html += '  <button class="dash-tab" data-tab="activity" onclick="switchTab(\'activity\')">Activity Log';
      if (activityLog.length > 0) html += ' <span class="tab-badge">' + activityLog.length + '</span>';
      html += '</button>';
      html += '  <button class="dash-tab" data-tab="history" onclick="switchTab(\'history\')">History';
      if (sessions.length > 0) html += ' <span class="tab-badge">' + sessions.length + '</span>';
      html += '</button>';
      if (purchases.length > 0) {
        html += '  <button class="dash-tab" data-tab="purchases" onclick="switchTab(\'purchases\')">Purchases</button>';
      }
      html += '  <button class="dash-tab" data-tab="settings" onclick="switchTab(\'settings\')" style="margin-left:auto">⚙ Settings</button>';
      html += '</div>';

      // ═══════════════════════════════
      // ── OVERVIEW TAB ──
      // ═══════════════════════════════
      html += '<div class="tab-panel active" id="panel-overview">';
      var lastSession = sessions.length > 0 ? sessions[0] : null;
      var chatUrl = lastSession ? '/chat?session=' + lastSession.id : '/chat';

      html += '<div class="overview-layout">';
      html += '<div class="overview-main">';

      // Upcoming deadlines card
      html += '<div class="dash-card">';
      html += '  <div class="card-label">Upcoming Deadlines</div>';
      var upcomingDeadlines = deadlines.filter(function(d) { return !d.is_completed; }).sort(function(a,b) { return a.deadline_date.localeCompare(b.deadline_date); }).slice(0, 5);
      if (upcomingDeadlines.length > 0) {
        upcomingDeadlines.forEach(function(d) {
          var days = daysUntil(d.deadline_date);
          var cls = days < 0 ? ' upcoming-overdue' : '';
          var label = days < 0 ? (Math.abs(days) + 'd overdue') : days === 0 ? 'Today' : days + 'd left';
          html += '<div class="upcoming-item">';
          html += '  <div class="upcoming-title">' + d.title + '</div>';
          html += '  <div style="display:flex;align-items:center;gap:6px">';
          html += '    <div class="upcoming-date' + cls + '">' + label + '</div>';
          html += '    <button class="item-del" onclick="event.stopPropagation();deleteDeadline(' + d.id + ')" title="Delete">&times;</button>';
          html += '  </div>';
          html += '</div>';
        });
        html += '<div style="margin-top:10px"><a href="#" onclick="switchTab(\'calendar\');return false" style="font-size:13px;color:var(--navy)">View all in calendar \u2192</a></div>';
      } else {
        html += '<p class="card-empty">No upcoming deadlines.</p>';
        html += '<div style="margin-top:8px"><a href="#" onclick="switchTab(\'calendar\');return false" style="font-size:13px;color:var(--navy)">Set up deadlines \u2192</a></div>';
      }
      html += '</div>';

      // Weekly & Monthly Goals
      var weeklyGoals = goals.filter(function(g) { return g.timeframe === 'weekly'; });
      var monthlyGoals = goals.filter(function(g) { return g.timeframe === 'monthly'; });

      html += '<div class="dash-grid">';

      // Weekly goals
      html += '<div class="dash-card">';
      html += '  <div class="card-label">Weekly Goals</div>';
      if (weeklyGoals.length > 0) {
        weeklyGoals.forEach(function(g) {
          var doneClass = g.is_completed ? ' done' : '';
          html += '<div class="goal-item' + doneClass + '">';
          html += '  <div class="check-box" onclick="toggleGoal(' + g.id + ', this.parentElement)"></div>';
          html += '  <div class="goal-text" onclick="toggleGoal(' + g.id + ', this.parentElement)">' + g.title + '</div>';
          if (g.target_date) html += '  <div class="goal-date">' + formatShortDate(g.target_date) + '</div>';
          html += '  <button class="item-del" onclick="deleteGoal(' + g.id + ')" title="Delete">&times;</button>';
          html += '</div>';
        });
      } else {
        html += '<p class="card-empty">No weekly goals yet.</p>';
      }
      html += '<div class="goal-add">';
      html += '  <input class="goal-input" id="weeklyGoalInput" placeholder="Add a weekly goal..." onkeydown="if(event.key===\'Enter\')addGoal(\'weekly\')">';
      html += '  <button class="init-btn" onclick="addGoal(\'weekly\')">Add</button>';
      html += '</div>';
      html += '</div>';

      // Monthly goals
      html += '<div class="dash-card">';
      html += '  <div class="card-label">Monthly Goals</div>';
      if (monthlyGoals.length > 0) {
        monthlyGoals.forEach(function(g) {
          var doneClass = g.is_completed ? ' done' : '';
          html += '<div class="goal-item' + doneClass + '">';
          html += '  <div class="check-box" onclick="toggleGoal(' + g.id + ', this.parentElement)"></div>';
          html += '  <div class="goal-text" onclick="toggleGoal(' + g.id + ', this.parentElement)">' + g.title + '</div>';
          if (g.target_date) html += '  <div class="goal-date">' + formatShortDate(g.target_date) + '</div>';
          html += '  <button class="item-del" onclick="deleteGoal(' + g.id + ')" title="Delete">&times;</button>';
          html += '</div>';
        });
      } else {
        html += '<p class="card-empty">No monthly goals yet.</p>';
      }
      html += '<div class="goal-add">';
      html += '  <input class="goal-input" id="monthlyGoalInput" placeholder="Add a monthly goal..." onkeydown="if(event.key===\'Enter\')addGoal(\'monthly\')">';
      html += '  <button class="init-btn" onclick="addGoal(\'monthly\')">Add</button>';
      html += '</div>';
      html += '</div>';

      html += '</div>'; // dash-grid

      // Important dates section
      html += '<div class="dash-card" style="margin-bottom:24px">';
      html += '  <div class="card-label">Important Dates</div>';
      var importantDates = deadlines.filter(function(d) { return d.source === 'manual'; });
      if (importantDates.length > 0) {
        importantDates.forEach(function(d) {
          var days = daysUntil(d.deadline_date);
          var label = days < 0 ? (Math.abs(days) + ' days ago') : days === 0 ? 'Today' : 'in ' + days + ' days';
          html += '<div class="date-item">';
          html += '  <div class="date-info"><div class="date-title">' + d.title + '</div>';
          html += '  <div class="date-when">' + formatShortDate(d.deadline_date) + ' \u2014 ' + label + '</div></div>';
          html += '  <button class="item-del" onclick="deleteDeadline(' + d.id + ')" title="Delete">&times;</button>';
          html += '</div>';
        });
      } else {
        html += '<p class="card-empty">Add important dates and they\'ll show up on your calendar automatically.</p>';
      }
      html += '<div class="date-add">';
      html += '  <input class="goal-input" id="dateTitleInput" placeholder="What\'s the date for?" style="flex:2">';
      html += '  <input type="date" class="calc-input" id="dateValueInput" style="flex:1">';
      html += '  <input class="goal-input" id="dateNoteInput" placeholder="Note (optional)" style="flex:2">';
      html += '  <button class="init-btn" onclick="addImportantDate()">Add</button>';
      html += '</div>';
      html += '</div>';

      html += '</div>'; // overview-main

      // Sidebar with progress ring
      html += '<div class="overview-sidebar">';
      html += '<div class="progress-compact">';
      html += '  <div class="card-label">Progress</div>';
      if (prog.total > 0) {
        var circumference = 2 * Math.PI * 30;
        var offset = circumference - (prog.pct / 100) * circumference;
        html += '  <div class="progress-ring" id="progressRing">';
        html += '    <svg width="72" height="72"><circle class="bg" cx="36" cy="36" r="30"/><circle class="fill" id="progressFill" cx="36" cy="36" r="30" stroke-dasharray="' + circumference + '" stroke-dashoffset="' + offset + '"/></svg>';
        html += '    <div class="progress-pct" id="progressPct">' + prog.pct + '%</div>';
        html += '  </div>';
        html += '  <div class="progress-info" id="progressInfo"><strong>' + prog.completed + '/' + prog.total + '</strong> tasks</div>';
      } else {
        html += '  <p class="card-empty" style="font-size:12px">No tasks yet</p>';
      }
      html += '</div>';

      // Quick links sidebar
      html += '<div class="progress-compact">';
      html += '  <div class="card-label">Quick Links</div>';
      html += '  <div style="display:flex;flex-direction:column;gap:6px;text-align:left">';
      html += '    <a href="' + chatUrl + '" target="_blank" style="font-size:12px;color:var(--navy);text-decoration:none">\uD83D\uDCAC Continue chatting</a>';
      html += '    <a href="#" onclick="switchTab(\'notes\');return false" style="font-size:12px;color:var(--navy);text-decoration:none">\uD83D\uDCDD Add a note</a>';
      html += '    <a href="#" onclick="switchTab(\'activity\');return false" style="font-size:12px;color:var(--navy);text-decoration:none">\uD83D\uDCCB Log activity</a>';
      html += '    <a href="#" onclick="switchTab(\'history\');return false" style="font-size:12px;color:var(--navy);text-decoration:none">\uD83D\uDCEC Chat history</a>';
      html += '  </div>';
      html += '</div>';

      // Quick Resources (based on user's checklist transition types)
      if (checklistItems.length > 0) {
        var transitionTypes = {};
        checklistItems.forEach(function(item) { transitionTypes[item.transition_type] = true; });
        var resourceMap = {
          'job-loss': [
            { label: 'File for unemployment', url: 'https://www.careeronestop.org/LocalHelp/UnemploymentBenefits/find-unemployment-benefits.aspx' },
            { label: 'Find health coverage', url: 'https://www.healthcare.gov' },
            { label: 'Resume builder', url: 'https://www.careeronestop.org/toolkit/resumes/resume-guide.aspx' }
          ],
          'job_loss': [
            { label: 'File for unemployment', url: 'https://www.careeronestop.org/LocalHelp/UnemploymentBenefits/find-unemployment-benefits.aspx' },
            { label: 'Find health coverage', url: 'https://www.healthcare.gov' },
            { label: 'Resume builder', url: 'https://www.careeronestop.org/toolkit/resumes/resume-guide.aspx' }
          ],
          'estate': [
            { label: 'Social Security survivor benefits', url: 'https://www.ssa.gov/benefits/survivors/' },
            { label: 'IRS estate tax info', url: 'https://www.irs.gov/businesses/small-businesses-self-employed/estate-tax' },
            { label: 'Find a probate attorney', url: 'https://www.findlaw.com/estate/probate/' }
          ],
          'divorce': [
            { label: 'Child support calculator', url: 'https://www.alllaw.com/calculators/childsupport' },
            { label: 'Legal aid near you', url: 'https://www.lsc.gov/about-lsc/what-legal-aid/get-legal-help' },
            { label: 'Credit report check', url: 'https://www.annualcreditreport.com' }
          ],
          'disability': [
            { label: 'Apply for SSDI', url: 'https://www.ssa.gov/disability/' },
            { label: 'State disability office', url: 'https://www.dol.gov/general/topic/disability' },
            { label: 'ADA resources', url: 'https://www.ada.gov' }
          ],
          'relocation': [
            { label: 'USPS mail forwarding', url: 'https://moversguide.usps.com' },
            { label: 'DMV by state', url: 'https://www.usa.gov/motor-vehicle-services' },
            { label: 'Update voter registration', url: 'https://vote.gov' }
          ],
          'retirement': [
            { label: 'Social Security benefits', url: 'https://www.ssa.gov/benefits/retirement/' },
            { label: 'Medicare enrollment', url: 'https://www.medicare.gov' },
            { label: 'Retirement savings calculator', url: 'https://www.investor.gov/financial-tools-calculators/calculators/compound-interest-calculator' }
          ]
        };
        var resourceLinks = [];
        Object.keys(transitionTypes).forEach(function(tt) {
          if (resourceMap[tt]) {
            resourceMap[tt].forEach(function(r) {
              var isDuplicate = resourceLinks.some(function(existing) { return existing.url === r.url; });
              if (!isDuplicate) resourceLinks.push(r);
            });
          }
        });
        if (resourceLinks.length > 0) {
          html += '<div class="progress-compact">';
          html += '  <div class="card-label">Quick Resources</div>';
          html += '  <div style="display:flex;flex-direction:column;gap:6px;text-align:left">';
          resourceLinks.forEach(function(r) {
            html += '    <a href="' + r.url + '" target="_blank" style="font-size:12px;color:var(--navy);text-decoration:none">\uD83D\uDD17 ' + r.label + '</a>';
          });
          html += '  </div>';
          html += '</div>';
        }
      }

      html += '</div>'; // overview-sidebar
      html += '</div>'; // overview-layout

      html += '</div>'; // panel-overview

      // ═══════════════════════════════
      // ── CHECKLIST TAB ──
      // ═══════════════════════════════
      html += '<div class="tab-panel" id="panel-checklist">';
      if (checklistItems.length > 0) {
        // Checklist layout: items on left, progress sidebar on right
        html += '<div style="display:grid;grid-template-columns:1fr 200px;gap:20px;align-items:start;">';

        // Left: checklist items
        html += '<div>';

        // Group by transition_type, then by phase
        var categories = {};
        var catOrder = [];
        checklistItems.forEach(function(item) {
          if (!categories[item.transition_type]) { categories[item.transition_type] = {}; catOrder.push(item.transition_type); }
          if (!categories[item.transition_type][item.phase]) categories[item.transition_type][item.phase] = [];
          categories[item.transition_type][item.phase].push(item);
        });

        var catLabels = { 'estate': 'Death & Estate', 'divorce': 'Divorce & Separation', 'job-loss': 'Job Loss & Income Crisis', 'relocation': 'Moving & Relocation', 'disability': 'Disability & Benefits', 'retirement': 'Retirement' };

        // Use 2 columns if multiple categories, single if just one
        if (catOrder.length > 1) {
          html += '<div class="checklist-cols">';
        }

        catOrder.forEach(function(cat) {
          var label = catLabels[cat] || cat;
          html += '<div class="checklist-category' + (catOrder.length === 1 ? ' checklist-single' : '') + '">';
          html += '<div class="category-header">' + label + '</div>';
          var phases = categories[cat];
          var phaseOrder = Object.keys(phases);
          phaseOrder.forEach(function(phase) {
            html += '<div class="phase-title">' + phase + '</div>';
            phases[phase].forEach(function(item) {
              var doneClass = item.is_completed ? ' done' : '';
              html += '<div class="check-item' + doneClass + '" onclick="toggleItem(' + item.id + ', this)">';
              html += '  <div class="check-box"></div>';
              html += '  <div class="check-text">' + item.item_text + '</div>';
              html += '</div>';
            });
          });
          html += '</div>';
        });

        if (catOrder.length > 1) {
          html += '</div>'; // checklist-cols
        }

        html += '</div>'; // end left

        // Right: progress sidebar
        html += '<div class="progress-compact" style="position:sticky;top:80px;">';
        html += progressRingHTML('cl', prog);
        html += '</div>';

        html += '</div>'; // end grid layout
      } else {
        html += '<div class="dash-card">';
        html += '  <div class="card-label">My Checklist</div>';
        html += '  <p class="card-empty">Create a checklist to stay organized through your transition.</p>';
        html += '</div>';
      }

      // Add checklist selector (always visible)
      html += '<div class="init-checklist">';
      html += '  <div class="init-label">Add a transition checklist:</div>';
      html += '  <div class="init-row">';
      html += '    <select class="init-select" id="transitionSelect">';
      html += '      <option value="">Choose a transition...</option>';
      html += '      <option value="estate">Death & Estate</option>';
      html += '      <option value="divorce">Divorce & Separation</option>';
      html += '      <option value="job-loss">Job Loss & Income Crisis</option>';
      html += '      <option value="relocation">Moving & Relocation</option>';
      html += '      <option value="disability">Disability & Benefits</option>';
      html += '      <option value="retirement">Retirement</option>';
      html += '    </select>';
      html += '    <button class="init-btn" onclick="initChecklist()">Add checklist</button>';
      html += '  </div>';
      html += '</div>';
      html += '</div>'; // panel-checklist

      // ═══════════════════════════════
      // ── CALENDAR TAB ──
      // ═══════════════════════════════
      html += '<div class="tab-panel" id="panel-calendar">';

      // Auto-calculate at top
      html += '<div class="calc-section">';
      html += '  <div class="calc-title">Auto-calculate deadlines</div>';
      html += '  <p class="card-empty" style="margin-bottom:12px">Select your transition type and enter the key date. We\'ll generate a full timeline of deadlines with docs needed and who to contact.</p>';
      html += '  <div class="calc-row">';
      html += '    <select class="init-select" id="calcTransition">';
      html += '      <option value="">Choose transition...</option>';
      html += '      <option value="retirement">Retirement date</option>';
      html += '      <option value="job-loss">Last day of work</option>';
      html += '      <option value="estate">Date of loved one\'s passing</option>';
      html += '      <option value="divorce">Date served / filing date</option>';
      html += '      <option value="relocation">Moving day</option>';
      html += '      <option value="disability">Diagnosis / disability start date</option>';
      html += '    </select>';
      html += '    <input type="date" class="calc-input" id="calcDate">';

    // ── Calendar ──
    // Global events map for day view
    var calEvents = {};

    function buildEventMap() {
      calEvents = {};
      var deadlines = dashData.deadlines || [];
      var goals = dashData.goals || [];
      deadlines.forEach(function(d) {
        if (!calEvents[d.deadline_date]) calEvents[d.deadline_date] = [];
        var type = d.source === 'manual' ? 'important' : 'deadline';
        calEvents[d.deadline_date].push({ type: type, title: d.title, note: d.note || '', completed: d.is_completed, id: d.id });
      });
      goals.forEach(function(g) {
        if (g.target_date) {
          if (!calEvents[g.target_date]) calEvents[g.target_date] = [];
          calEvents[g.target_date].push({ type: 'goal', title: g.title, note: '', completed: g.is_completed, id: g.id });
        }
      });
    }

    function renderCalendar() {
      var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      var label = document.getElementById('calMonthLabel');
      if (label) label.textContent = months[calMonth] + ' ' + calYear;

      var grid = document.getElementById('calGrid');
      if (!grid) return;

      buildEventMap();

      var firstDay = new Date(calYear, calMonth, 1);
      var lastDay = new Date(calYear, calMonth + 1, 0);
      var startDay = firstDay.getDay();
      var daysInMonth = lastDay.getDate();

      var today = new Date();
      today.setHours(0,0,0,0);
      var todayStr = today.toISOString().split('T')[0];

      var h = '';
      var dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      dayNames.forEach(function(d) { h += '<div class="cal-header">' + d + '</div>'; });

      // Previous month days
      var prevMonth = new Date(calYear, calMonth, 0);
      for (var i = startDay - 1; i >= 0; i--) {
        var day = prevMonth.getDate() - i;
        h += '<div class="cal-day other-month"><div class="cal-day-num">' + day + '</div></div>';
      }

      // Current month days
      for (var d = 1; d <= daysInMonth; d++) {
        var dateStr = calYear + '-' + String(calMonth + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
        var isToday = dateStr === todayStr;
        h += '<div class="cal-day' + (isToday ? ' today' : '') + '" onclick="openDayView(\'' + dateStr + '\')">';
        h += '<div class="cal-day-num">' + d + '</div>';
        if (calEvents[dateStr]) {
          calEvents[dateStr].slice(0, 3).forEach(function(ev) {
            var cls = ev.type + (ev.completed ? ' completed' : '');
            h += '<div class="cal-event ' + cls + '" title="' + ev.title.replace(/"/g, '&quot;') + '">' + ev.title + '</div>';
          });
          if (calEvents[dateStr].length > 3) {
            h += '<div class="cal-event" style="color:var(--muted);background:none">+' + (calEvents[dateStr].length - 3) + ' more</div>';
          }
        }
        h += '</div>';
      }

      // Next month days
      var totalCells = startDay + daysInMonth;
      var remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
      for (var i = 1; i <= remaining; i++) {
        h += '<div class="cal-day other-month"><div class="cal-day-num">' + i + '</div></div>';
      }

      grid.innerHTML = h;
    }

    function changeMonth(dir) {
      calMonth += dir;
      if (calMonth > 11) { calMonth = 0; calYear++; }
      if (calMonth < 0) { calMonth = 11; calYear--; }
      renderCalendar();
    }

    // ── Day view ──
    function openDayView(dateStr) {
      var d = new Date(dateStr + 'T00:00:00');
      var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      var dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      document.getElementById('dayTitle').textContent = dayNames[d.getDay()] + ', ' + months[d.getMonth()] + ' ' + d.getDate();

      var eventsDiv = document.getElementById('dayEvents');
      var evts = calEvents[dateStr] || [];
      var h = '';
      if (evts.length > 0) {
        evts.forEach(function(ev) {
          h += '<div class="day-event">';
          h += '  <div class="day-dot ' + ev.type + '"></div>';
          h += '  <div style="flex:1">';
          h += '    <div class="day-event-title">' + ev.title + '</div>';
          if (ev.note) {
            // Split note into readable sections if it contains Docs: and Contact:
            var noteHtml = ev.note.replace(/Docs:/g, '<br><strong style="color:var(--navy);font-size:11px">DOCS NEEDED:</strong>').replace(/Contact:/g, '<br><strong style="color:var(--navy);font-size:11px">CONTACT:</strong>');
            h += '    <div class="day-event-note" style="white-space:pre-wrap;line-height:1.5">' + noteHtml + '</div>';
          }
          h += '  </div>';
          var delFn = ev.type === 'goal' ? 'deleteGoal' : 'deleteDeadline';
          h += '  <div class="item-actions" style="margin-top:2px">';
          h += '    <button class="item-edit" onclick="editEventNote(' + ev.id + ',\'' + ev.type + '\')" title="Edit details">Edit</button>';
          h += '    <button class="item-del" onclick="' + delFn + '(' + ev.id + ');closeDayView()" title="Delete">&times;</button>';
          h += '  </div>';
          h += '</div>';
        });
      } else {
        h = '<p class="day-empty">Nothing scheduled for this day.</p>';
      }
      eventsDiv.innerHTML = h;
      document.getElementById('dayModal').classList.add('open');
    }

    function closeDayView() {
      document.getElementById('dayModal').classList.remove('open');
    }

    function editEventNote(id, type) {
      var newNote = prompt('Edit details/notes for this event:');
      if (newNote === null) return;
      var url = type === 'goal' ? '/api/goals/' + id : '/api/deadlines/' + id;
      fetch(url, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ note: newNote })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) { if (data.ok) { closeDayView(); loadDashboard(); } });
    }

    // ── Important dates ──
    function addImportantDate() {
      var title = document.getElementById('dateTitleInput').value.trim();
      var date = document.getElementById('dateValueInput').value;
      var note = document.getElementById('dateNoteInput').value.trim();
      if (!title || !date) return;
      fetch('/api/deadlines', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: title, deadline_date: date, note: note, transition_type: null })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.ok) loadDashboard();
      });
    }

    // ── Progress updates ──
    function updateProgressUI() {
      var prog = getProgress();
      var circumference = 2 * Math.PI * 30;
      var offset = circumference - (prog.pct / 100) * circumference;
      // Update sidebar progress ring
      var fill = document.getElementById('progressFill');
      var pct = document.getElementById('progressPct');
      var info = document.getElementById('progressInfo');
      if (fill) fill.setAttribute('stroke-dashoffset', offset);
      if (pct) pct.textContent = prog.pct + '%';
      if (info) info.innerHTML = '<strong>' + prog.completed + '/' + prog.total + '</strong> tasks';
      // Update checklist tab progress
      var clFill = document.getElementById('clFill');
      var clPct = document.getElementById('clPct');
      var clInfo = document.getElementById('clInfo');
      if (clFill) clFill.setAttribute('stroke-dashoffset', offset);
      if (clPct) clPct.textContent = prog.pct + '%';
      if (clInfo) clInfo.innerHTML = '<strong>' + prog.completed + ' of ' + prog.total + '</strong> tasks completed';
      // Update tab badge
      var clTab = document.querySelector('[data-tab="checklist"]');
      if (clTab) {
        var badge = clTab.querySelector('.tab-badge');
        if (badge) badge.textContent = prog.completed + '/' + prog.total;
      }
    }

    // ── Checklist actions ──
    function toggleItem(itemId, el) {
      fetch('/api/checklist/' + itemId + '/toggle', { method: 'POST' })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.ok) {
          el.classList.toggle('done');
          checklistItems.forEach(function(item) {
            if (item.id === itemId) item.is_completed = data.is_completed;

    // ── Deadline actions ──
    function deleteDeadline(deadlineId) {
      if (!confirm('Delete this item?')) return;

    function calculateDeadlines() {
      var type = document.getElementById('calcTransition').value;
      var date = document.getElementById('calcDate').value;
      if (!type || !date) { alert('Please select a transition type and enter a date.'); return; }
      fetch('/api/deadlines/calculate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ transition_type: type, key_date: date })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.ok) {
          currentTab = 'calendar';
          loadDashboard();
        }
      });
    }

    // ── Calendar view toggle ──
    var calView = 'month';

    function setCalView(view) {
      calView = view;
      var monthBtn = document.getElementById('monthViewBtn');
      var dayBtn = document.getElementById('dayViewBtn');
      var grid = document.getElementById('calGrid');
      var dayPanel = document.getElementById('dayViewPanel');
      if (monthBtn) monthBtn.classList.toggle('active', view === 'month');
      if (dayBtn) dayBtn.classList.toggle('active', view === 'day');
      if (view === 'month') {
        if (grid) grid.style.display = '';
        if (dayPanel) dayPanel.style.display = 'none';
      } else {
        if (grid) grid.style.display = 'none';
        if (dayPanel) { dayPanel.style.display = ''; renderDayViewPanel(); }
      }
    }

    function renderDayViewPanel() {
      var panel = document.getElementById('dayViewPanel');
      if (!panel) return;
      var today = new Date();
      var dateStr = today.toISOString().split('T')[0];
      var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      var dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      var h = '<div style="text-align:center;margin-bottom:16px">';
      h += '<div style="font-family:Cormorant Garamond,serif;font-size:22px;font-weight:400">' + dayNames[today.getDay()] + ', ' + months[today.getMonth()] + ' ' + today.getDate() + ', ' + today.getFullYear() + '</div>';
      h += '</div>';

      buildEventMap();
      var evts = calEvents[dateStr] || [];
      if (evts.length > 0) {
        evts.forEach(function(ev) {
          var color = ev.type === 'deadline' ? 'var(--red)' : ev.type === 'goal' ? 'var(--gold)' : 'var(--navy)';
          h += '<div style="display:flex;align-items:flex-start;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)">';
          h += '  <div style="width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0;background:' + color + '"></div>';
          h += '  <div style="flex:1">';
          h += '    <div style="font-size:14px;font-weight:400">' + ev.title + '</div>';
          if (ev.note) h += '    <div style="font-size:12px;color:var(--muted);margin-top:2px;white-space:pre-wrap">' + ev.note + '</div>';
          h += '  </div>';
          var delFn = ev.type === 'goal' ? 'deleteGoal' : 'deleteDeadline';
          h += '  <button class="item-del" onclick="' + delFn + '(' + ev.id + ')">&times;</button>';
          h += '</div>';
        });
      } else {
        h += '<p class="day-empty">Nothing scheduled for today.</p>';
      }
      panel.innerHTML = h;
    }

    // ── Add calendar event ──
    function addCalEvent() {
      var title = document.getElementById('calEventTitle').value.trim();
      var date = document.getElementById('calEventDate').value;
      var note = document.getElementById('calEventNote').value.trim();
      var type = document.getElementById('calEventType').value;
      if (!title || !date) { alert('Please enter a title and date.'); return; }

      if (type === 'goal') {
        fetch('/api/goals', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: title, timeframe: 'monthly', target_date: date })
        }).then(function(r) { return r.json(); })
        .then(function(data) { if (data.ok) loadDashboard(); });
      } else {
        fetch('/api/deadlines', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: title, deadline_date: date, note: note, transition_type: null })
        }).then(function(r) { return r.json(); })
        .then(function(data) { if (data.ok) loadDashboard(); });
      }
    }

    // ── Document actions ──
    function toggleDocument(docId, el) {
      fetch('/api/documents-needed/' + docId + '/toggle', { method: 'POST' })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.ok) {
          el.classList.toggle('gathered');
          (dashData.documents_needed || []).forEach(function(d) {
            if (d.id === docId) d.is_gathered = data.is_gathered;
          });
          var docsTab = document.querySelector('[data-tab="documents"]');
          if (docsTab) {
            var badge = docsTab.querySelector('.tab-badge');
            var remaining = (dashData.documents_needed || []).filter(function(d) { return !d.is_gathered; }).length;
            if (badge) badge.textContent = remaining;
          }
        }
      });
    }

    function addDocument() {
      var name = document.getElementById('addDocName').value.trim();
      var desc = document.getElementById('addDocDesc').value.trim();

      fetch('/api/documents-needed', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ document_name: name, description: desc })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) { if (data.ok) { currentTab = 'documents'; loadDashboard(); } });

      .then(function(r) { return r.json(); })

    function editDocument(docId, name, desc) {
      var newName = prompt('Document name:', name);
      if (newName === null) return;
      var newDesc = prompt('Description:', desc);

        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ document_name: newName, description: newDesc })

      .then(function(data) { if (data.ok) { currentTab = 'documents'; loadDashboard(); } });

        headers: { 'Content-Type': 'application/json' },

    function editNote(noteId) {
      var card = document.getElementById('note-' + noteId);
      var contentEl = card.querySelector('.note-content');
      var currentText = contentEl.innerHTML.replace(/<br>/g, '\n').replace(/&lt;/g, '<');

      h += '<div style="margin-top:8px;display:flex;gap:8px;justify-content:flex-end">';
      h += '  <button class="btn-ghost" style="font-size:12px;padding:6px 14px" onclick="loadDashboard()">Cancel</button>';
      h += '  <button class="init-btn" style="font-size:12px;padding:6px 14px" onclick="updateNote(' + noteId + ')">Save</button>';
      h += '</div>';
      card.innerHTML = h;
    }

      .then(function(data) {

          currentTab = 'notes';
          loadDashboard();
        }

    // ── Activity Log actions ──
    function addActivityLog() {
      var actionType = document.getElementById('activityType').value;
      var contact = document.getElementById('activityContact').value.trim();
      var org = document.getElementById('activityOrg').value.trim();
      var desc = document.getElementById('activityDesc').value.trim();
      var date = document.getElementById('activityDate').value;
      if (!desc || !date) { alert('Please enter a description and date.'); return; }
      fetch('/api/activity-log', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action_type: actionType, contact_name: contact, organization: org, description: desc, date: date })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.ok) {
          currentTab = 'activity';
          loadDashboard();
        }
      });
    }

    function deleteActivityLog(entryId) {
      if (!confirm('Delete this activity log entry?')) return;
      fetch('/api/activity-log/' + entryId, { method: 'DELETE' })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.ok) {
          currentTab = 'activity';
          loadDashboard();
        }
      });
    }

    function editActivityLog(entryId) {
      var entry = activityLog.filter(function(e) { return e.id === entryId; })[0];
      if (!entry) return;
      var newDesc = prompt('Edit description:', entry.description);
      if (newDesc === null) return;
      // Delete and re-add with updated description (simple edit approach)
      fetch('/api/activity-log/' + entryId, { method: 'DELETE' })
      .then(function(r) { return r.json(); })
      .then(function() {
        return fetch('/api/activity-log', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action_type: entry.action_type, contact_name: entry.contact_name || '', organization: entry.organization || '', description: newDesc, date: entry.date })
        });
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.ok) {
          currentTab = 'activity';
          loadDashboard();
        }
      });
    }

    // ── Conversation modal ──
    function openConv(sessionId) {
      document.getElementById('convMessages').innerHTML = '<div class="loading">Loading conversation...</div>';
      document.getElementById('convModal').classList.add('open');
      fetch('/api/dashboard/history/' + sessionId)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var html = '';
        (data.messages || []).forEach(function(m) {
          html += '<div class="conv-msg ' + m.role + '">' + m.content.replace(/</g, '&lt;').replace(/\n/g, '<br>') + '</div>';
        });
        if (!html) html = '<p class="card-empty">No messages found for this session.</p>';
        document.getElementById('convMessages').innerHTML = html;
      });
    }

    function closeConv() {
      document.getElementById('convModal').classList.remove('open');
    }

    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') { closeConv(); closeDayView(); } });

    loadDashboard();
  </script>
