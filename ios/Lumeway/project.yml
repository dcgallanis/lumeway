name: Lumeway
options:
  bundleIdPrefix: co.lumeway
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: Lumeway/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    CODE_SIGN_STYLE: Automatic

targets:
  Lumeway:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Lumeway
        excludes:
          - "*.xcassets/AppIcon.appiconset/*.svg"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.lumeway.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: Lumeway/Info.plist
        CODE_SIGN_ENTITLEMENTS: Lumeway/Lumeway.entitlements
    entitlements:
      path: Lumeway/Lumeway.entitlements
      properties:
        aps-environment: development
